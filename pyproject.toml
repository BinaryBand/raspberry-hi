[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[project]
name = "raspberry-hi"
version = "0.1.0"
description = "Raspberry Pi management tools"
authors = [
    { name = "BinaryBand", email = "BinaryBand@users.noreply.github.com" },
]
requires-python = ">=3.14"

dependencies = [
    "fabric (>=3.2.3,<4.0.0)",
    "rich (>=14.3.3,<15.0.0)",
    "questionary (>=2.1.1,<3.0.0)",
    "ansible (>=13.5.0,<14.0.0)",
    "pydantic (>=2.13.0,<3.0.0)",
]

[dependency-groups]
dev = [
    "ruff (>=0.15.10,<0.16.0)",
    "pyright (>=1.1.408,<2.0.0)",
    "ansible-lint (>=26.4.0,<27.0.0)",
    "ansible-stubs (>=0.1.dev1,<0.2)",
]

[tool.poetry]
package-mode = false

[tool.pyright]
stubPath = "stubs"

[tool.ruff]
target-version = "py314"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "A", "B", "S"]
