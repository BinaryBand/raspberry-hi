[project]
name = "raspberry-hi"
version = "0.1.0"
description = "Raspberry Pi management tools"
authors = [
    { name = "BinaryBand", email = "BinaryBand@users.noreply.github.com" },
]
requires-python = ">=3.12"
dependencies = [
    "fabric (>=3.2.3,<4.0.0)",
    "rich (>=14.3.3,<15.0.0)",
    "questionary (>=2.1.1,<3.0.0)",
    "ansible (>=13.5.0,<14.0.0)",
    "ansible-stubs (>=0.1.dev1,<0.2)",
]


[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
