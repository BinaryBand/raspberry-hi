name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true

      - name: Cache virtual environment
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-ubuntu-py3.12-${{ hashFiles('poetry.lock') }}
          restore-keys: venv-ubuntu-py3.12-

      - name: Install dependencies
        run: poetry install

      - name: Run ruff
        run: make lint

  test:
    name: Unit & stub tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true

      - name: Cache virtual environment
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-ubuntu-py3.12-${{ hashFiles('poetry.lock') }}
          restore-keys: venv-ubuntu-py3.12-

      - name: Install dependencies
        run: poetry install

      - name: Run tests
        run: make test
