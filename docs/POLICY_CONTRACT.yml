version: 1
source: docs/ARCHITECTURE.md

policies:
  - id: authority-mechanical-rules
    statement: ".semgrep.yml defines repository rules that must hold mechanically."
    source_line: 7
    status: enforced
    controls:
      - semgrep:.semgrep.yml
      - make:lint

  - id: python-must-not-become-source-of-truth
    statement: "Python must not become a second source of truth for declared state."
    source_line: 20
    status: enforced
    controls:
      - semgrep:python-must-not-run-ansible-playbook
      - semgrep:python-ansible-vault-only-in-vault-service
      - semgrep:python-ruamel-yaml-only-in-ansible-access

  - id: make-style-contract-must-hold
    statement: "All Makefile changes must satisfy the Make Style Contract."
    source_line: 150
    status: enforced
    controls:
      - make:checkmake
      - semgrep:make-no-direct-poetry-run
      - semgrep:make-no-hardcoded-py-dirs
      - repo-policy:makefile-phony-and-style

  - id: make-workflows-must-support-host-selector
    statement: "Operator-facing workflows must keep HOST=<alias> support and default to the repo standard host selector."
    source_line: 157
    status: enforced
    controls:
      - repo-policy:makefile-host-selector
      - make:repo-policy

  - id: setup-must-assert-become-passwords
    statement: "ansible/playbooks/setup.yml includes an always-on assertion that the current host has a become_passwords entry."
    source_line: 61
    status: enforced
    controls:
      - repo-policy:site-become-password-assertion
      - make:repo-policy

  - id: app-playbooks-must-exist-for-all-registered-apps
    statement: "Every app in ansible/registry.yml must have a generated per-app playbook at ansible/apps/<app>/playbook.yml."
    status: enforced
    controls:
      - repo-policy:app-playbooks
      - make:generate-apps

  - id: make-targets-must-fail-fast-on-runtime-inputs
    statement: "Targets that require runtime inputs fail fast with explicit guard checks and actionable error messages."
    source_line: 156
    status: enforced
    controls:
      - repo-policy:makefile-guard-checks
      - make:repo-policy

  - id: durable-state-writes-use-dedicated-seams
    statement: "Keep durable state changes behind the dedicated inventory and vault helpers."
    source_line: 309
    status: enforced
    controls:
      - repo-policy:no-direct-host-group-writes
      - semgrep:python-ansible-vault-only-in-vault-service
      - semgrep:python-ruamel-yaml-only-in-ansible-access

  - id: role-meta-dependencies-must-stay-empty
    statement: "meta/main.yml dependencies must stay empty for app roles."
    source_line: 182
    status: enforced
    controls:
      - semgrep:ansible-meta-no-non-empty-dependencies

  - id: app-data-paths-must-be-explicitly-declared
    statement: "Application data paths must be explicitly declared."
    source_line: 212
    status: enforced
    controls:
      - repo-policy:app-data-paths
      - make:repo-policy

  - id: rclone-conf-must-not-be-committed
    statement: ".rclone.conf contains rclone OAuth tokens and must never be tracked by git."
    status: enforced
    controls:
      - semgrep:rclone-conf-not-tracked
