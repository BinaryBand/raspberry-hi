---
- name: Purge application from device
  hosts: devices
  gather_facts: true

  pre_tasks:
    - name: Load common pre-tasks
      ansible.builtin.import_tasks: ../tasks/pre_tasks.yml

    - name: Load app registry metadata
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../registry.yml"
        name: app_registry
      tags: [always]

    - name: Derive cleanup apps from registry
      ansible.builtin.set_fact:
        cleanup_supported_apps: >-
          {{
            app_registry.apps
            | dict2items
            | selectattr('value.cleanup', 'equalto', true)
            | map(attribute='key')
            | list
          }}
      tags: [always]

    - name: Require cleanup_app variable
      ansible.builtin.assert:
        that: cleanup_app is defined and cleanup_app | length > 0
        fail_msg: >-
          cleanup_app is not set.
          Pass it with: make cleanup APP=minio  (or one of {{ cleanup_supported_apps | join(', ') }})
      tags: [always]

    - name: Validate cleanup_app is supported
      ansible.builtin.assert:
        that:
          - cleanup_app in cleanup_supported_apps
        fail_msg: >-
          cleanup_app '{{ cleanup_app }}' is not supported.
          Supported cleanup apps: {{ cleanup_supported_apps | join(', ') }}.
      tags: [always]

    - name: Confirm destructive operation
      ansible.builtin.pause:
        prompt: >-
          WARNING: This will PERMANENTLY DELETE all data for '{{ cleanup_app }}'
          on '{{ inventory_hostname }}'. Type 'yes' to continue
      register: _cleanup_confirm
      when: not (cleanup_skip_confirm | default(false) | bool)
      tags: [always]

    - name: Abort if not confirmed
      ansible.builtin.fail:
        msg: "Cleanup aborted."
      when:
        - not (cleanup_skip_confirm | default(false) | bool)
        - _cleanup_confirm.user_input | default('') != 'yes'
      tags: [always]

  tasks:
    - name: Purge selected app
      ansible.builtin.include_tasks:
        file: "{{ playbook_dir }}/../apps/{{ cleanup_app }}/cleanup.yml"
