---
- name: Restore an app from restic
  hosts: devices
  gather_facts: true

  pre_tasks:
    - name: Load common pre-tasks
      ansible.builtin.import_tasks: ../tasks/pre_tasks.yml

    - name: Load app registry metadata
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../registry.yml"
        name: app_registry
      tags: [always]

    - name: Derive restore apps from registry
      ansible.builtin.set_fact:
        restore_supported_apps: >-
          {{
            app_registry.apps
            | dict2items
            | selectattr('value.restore', 'equalto', true)
            | map(attribute='key')
            | list
          }}
      tags: [always]

    - name: Require restore_app variable
      ansible.builtin.assert:
        that: restore_app is defined and restore_app | length > 0
        fail_msg: >-
          restore_app is not set.
          Pass it with: make restore APP=minio  (or one of {{ restore_supported_apps | join(', ') }})
      tags: [always]

    - name: Validate restore_app is supported
      ansible.builtin.assert:
        that:
          - restore_app in restore_supported_apps
        fail_msg: >-
          restore_app '{{ restore_app }}' is not supported.
          Supported restore apps: {{ restore_supported_apps | join(', ') }}.
      tags: [always]

    - name: Confirm destructive operation
      ansible.builtin.pause:
        prompt: >-
          WARNING: This will OVERWRITE all data for '{{ restore_app }}'
          on '{{ inventory_hostname }}' with the latest restic snapshot.
          Type 'yes' to continue
      register: _restore_confirm
      when: not (restore_skip_confirm | default(false) | bool)
      tags: [always]

    - name: Abort if not confirmed
      ansible.builtin.fail:
        msg: "Restore aborted."
      when:
        - not (restore_skip_confirm | default(false) | bool)
        - _restore_confirm.user_input | default('') != 'yes'
      tags: [always]

  tasks:
    - name: Restore selected app
      ansible.builtin.include_tasks:
        file: "{{ playbook_dir }}/../apps/{{ restore_app }}/restore.yml"
