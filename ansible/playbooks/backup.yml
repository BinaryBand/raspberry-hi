---
- name: Back up all apps to restic
  hosts: devices
  gather_facts: true

  pre_tasks:
    - name: Load common pre-tasks
      ansible.builtin.import_tasks: ../tasks/pre_tasks.yml

    - name: Load app registry metadata
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../registry.yml"
        name: app_registry
      tags: [always]

    - name: Derive backup apps from registry
      ansible.builtin.set_fact:
        backup_apps: >-
          {{
            app_registry.apps
            | dict2items
            | selectattr('value.backup', 'equalto', true)
            | map(attribute='key')
            | list
          }}
      tags: [always]

  tasks:
    - name: Back up app
      ansible.builtin.include_tasks:
        file: "{{ playbook_dir }}/../apps/{{ item }}/backup.yml"
      loop: "{{ backup_apps }}"
      when: lookup('vars', item | replace('-', '_') + '_data_path', default=none) is not none
      tags: ["{{ item }}"]

    - name: Prune old restic snapshots
      ansible.builtin.include_role:
        name: restic
        tasks_from: prune
      tags: [always]
