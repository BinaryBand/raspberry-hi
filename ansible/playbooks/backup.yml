---
- name: Back up all apps to restic
  hosts: devices
  gather_facts: true

  pre_tasks:
    - name: Load shared non-secret variables
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../group_vars/all/vars.yml"
      tags: [always]

    - name: Load shared vault variables
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../group_vars/all/vault.yml"
      tags: [always]

    - name: Verify become password is configured for this host
      ansible.builtin.assert:
        that: (become_passwords | default({})).get(inventory_hostname, '') | length > 0
        fail_msg: >-
          become password not set for '{{ inventory_hostname }}'.
          Run 'make bootstrap' to add it.
      tags: [always]

    # Mirror cleanup.yml: set non-host-specific defaults without include_vars
    # so host_vars values (e.g. minio_data_path) are not overridden with null.
    - name: Set service name and path defaults
      ansible.builtin.set_fact:
        minio_service_name: "{{ minio_service_name | default('minio') }}"
        postgres_service_name: "{{ postgres_service_name | default('postgres') }}"
        postgres_database: "{{ postgres_database | default('baikal') }}"
        postgres_user: "{{ postgres_user | default('baikal') }}"
        postgres_runtime_uid: "{{ postgres_runtime_uid | default(70) }}"
        baikal_service_name: "{{ baikal_service_name | default('baikal') }}"
      tags: [always]

  tasks:
    - name: Back up MinIO
      ansible.builtin.include_tasks:
        file: "{{ playbook_dir }}/../apps/minio/backup/main.yml"
      when: minio_data_path is defined
      tags: [minio]

    - name: Back up PostgreSQL
      ansible.builtin.include_tasks:
        file: "{{ playbook_dir }}/../apps/postgres/backup/main.yml"
      when: postgres_data_path is defined
      tags: [postgres]

    - name: Back up Baikal
      ansible.builtin.include_tasks:
        file: "{{ playbook_dir }}/../apps/baikal/backup/main.yml"
      when: baikal_data_path is defined
      tags: [baikal]

    - name: Prune old restic snapshots
      ansible.builtin.include_role:
        name: restic
        tasks_from: prune
      tags: [always]
