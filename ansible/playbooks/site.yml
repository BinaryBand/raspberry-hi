---
- name: Provision devices
  hosts: devices
  gather_facts: true

  pre_tasks:
    - name: Load shared non-secret variables
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../group_vars/all/vars.yml"
      tags: [always]

    - name: Load shared vault variables
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../group_vars/all/vault.yml"
      tags: [always]

    - name: Verify become password is configured for this host
      ansible.builtin.assert:
        that: (become_passwords | default({})).get(inventory_hostname, '') | length > 0
        fail_msg: >-
          become password not set for '{{ inventory_hostname }}'.
          Run 'make bootstrap' to add it.
      tags: [always]

  roles:
    - role: auto-updates
      tags: [base]
      become: true

    - role: podman
      tags: [podman]
      become: true

    - role: rclone
      tags: [base]

    # App roles live under ansible/apps/ and are excluded from `make site` by default.
    # They are tagged with both [apps] and their own name so they can be run individually.

    # Run `make minio` to provision or re-provision MinIO independently.
    - role: minio
      tags: [apps, minio]

    # Run `make postgres` to provision PostgreSQL independently.
    # It is also tagged with baikal because Baikal depends on it.
    - role: postgres
      tags: [apps, postgres, baikal]

    # Run `make baikal` to provision or re-provision Baikal independently.
    - role: baikal
      tags: [apps, baikal]

    # Run `make restic` to provision restic and initialise the backup repository.
    - role: restic
      tags: [apps, restic]
