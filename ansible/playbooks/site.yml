---
# Full-system convergence: import all app playbooks in dependency order.
# Each playbook handles its own system role prerequisites (caddy, rclone, postgres).
- name: Provision baseline (auto-updates + podman)
  import_playbook: setup.yml

- name: Provision postgres
  import_playbook: ../roles/postgres/playbook.yml

- name: Provision minio
  import_playbook: ../roles/minio/playbook.yml

- name: Provision baikal
  import_playbook: ../roles/baikal/playbook.yml

- name: Provision synapse
  import_playbook: ../roles/synapse/playbook.yml

- name: Provision mautrix-whatsapp
  import_playbook: ../roles/mautrix-whatsapp/playbook.yml

- name: Provision jellyfin
  import_playbook: ../roles/jellyfin/playbook.yml
