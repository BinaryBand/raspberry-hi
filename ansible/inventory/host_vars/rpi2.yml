# ansible_host accepts either a raw IP (192.168.0.x) or an mDNS name (rpi2.local).
# mDNS is preferred for home networks — survives DHCP address changes without editing this file.
ansible_host: 192.168.0.35
ansible_user: avid-askew-dean
ansible_port: 22
ansible_ssh_private_key_file: config/.ed25519
ansible_become_password: "{{ (become_passwords | default({})).get(inventory_hostname, '') }}"
postgres_data_path: /home/raspberry-hi/postgres
baikal_config_path: /home/raspberry-hi/baikal/config
baikal_data_path: /home/raspberry-hi/baikal/data
