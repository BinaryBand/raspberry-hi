---
mautrix_whatsapp_data_path: /home/linux-hi/mautrix-whatsapp

# Must match the value used by the synapse role (or host_vars override).
synapse_data_path: /home/linux-hi/synapse

# Matrix homeserver connection within the same pod network namespace.
mautrix_whatsapp_homeserver_address: "http://localhost:{{ synapse_port }}"
mautrix_whatsapp_appservice_address: "http://localhost:29318"

# PostgreSQL database — provisioned by ensure_app_db during make mautrix-whatsapp.
mautrix_whatsapp_db_name: mautrix_whatsapp
mautrix_whatsapp_db_host: localhost
mautrix_whatsapp_db_user: mautrix_whatsapp
