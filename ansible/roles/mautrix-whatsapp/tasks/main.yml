---
# 0. Guard: fail fast if required variables are not explicitly configured.
- name: Assert mautrix_whatsapp_homeserver_address is set
  ansible.builtin.assert:
    that: mautrix_whatsapp_homeserver_address is not none
    fail_msg: >-
      mautrix_whatsapp_homeserver_address is not set for '{{ inventory_hostname }}'.
      Add it to ansible/inventory/host_vars/{{ inventory_hostname }}.yml:
        mautrix_whatsapp_homeserver_address: https://example.com

# 1. App-specific: data directory, config, and database.
- name: Ensure mautrix-whatsapp data directory exists
  ansible.builtin.file:
    path: "{{ mautrix_whatsapp_data_path }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0750"
  become: true

- name: Install mautrix-whatsapp config
  ansible.builtin.template:
    src: mautrix-whatsapp-config.yaml.j2
    dest: "{{ mautrix_whatsapp_data_path }}/config.yaml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
  become: true
  notify: restart mautrix-whatsapp
  no_log: true

- name: Check mautrix-whatsapp data directory owner in podman user namespace
  ansible.builtin.command:
    argv:
      - podman
      - unshare
      - stat
      - -c
      - "%u:%g"
      - "{{ mautrix_whatsapp_data_path }}"
  become: true
  become_user: "{{ ansible_user }}"
  register: _mautrix_whatsapp_dir_owner
  changed_when: false

- name: Fix mautrix-whatsapp data directory ownership for rootless podman
  ansible.builtin.command:
    argv:
      - podman
      - unshare
      - chown
      - -R
      - "{{ mautrix_whatsapp_runtime_uid }}:{{ mautrix_whatsapp_runtime_gid }}"
      - "{{ mautrix_whatsapp_data_path }}"
  become: true
  become_user: "{{ ansible_user }}"
  when: >-
    _mautrix_whatsapp_dir_owner.stdout | trim !=
    (mautrix_whatsapp_runtime_uid | string ~ ':' ~ mautrix_whatsapp_runtime_gid | string)
  changed_when: true
  notify: restart mautrix-whatsapp

# 2. Pre-pull the image to avoid systemd timing out on slow connections.
- name: Pull mautrix-whatsapp container image
  ansible.builtin.command:
    argv:
      - podman
      - pull
      - "{{ mautrix_whatsapp_image }}"
  become: true
  become_user: "{{ ansible_user }}"
  register: _mautrix_whatsapp_pull
  changed_when: "'Copying' in _mautrix_whatsapp_pull.stdout"

- name: Provision mautrix-whatsapp PostgreSQL database
  ansible.builtin.include_role:
    name: postgres
    tasks_from: ensure_app_db
  vars:
    postgres_db_user: "{{ mautrix_whatsapp_db_user }}"
    postgres_db_name: "{{ mautrix_whatsapp_db_name }}"
    postgres_db_password: "{{ mautrix_whatsapp_db_password }}"

# Template registration.yaml from the vault-stored tokens. This file must be
# registered with the Matrix homeserver (copy it from mautrix_whatsapp_data_path).
- name: Install mautrix-whatsapp appservice registration file
  ansible.builtin.template:
    src: mautrix-whatsapp-registration.yaml.j2
    dest: "{{ mautrix_whatsapp_data_path }}/registration.yaml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
  become: true
  notify: restart mautrix-whatsapp
  no_log: true

# Also place the registration file in the Synapse data directory so Synapse
# can read it via app_service_config_files in homeserver.yaml.
- name: Install registration file into Synapse data directory
  ansible.builtin.template:
    src: mautrix-whatsapp-registration.yaml.j2
    dest: "{{ synapse_data_path }}/mautrix-whatsapp-registration.yaml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
  become: true
  notify: restart synapse
  no_log: true

# The Synapse container runs as synapse_runtime_uid inside the podman user
# namespace. Writing the file as ansible_user above makes it unreadable to
# Synapse (owner mismatch + mode 0600). Re-chown via podman unshare so the
# UID mapping resolves correctly inside the container.
- name: Fix registration file ownership for Synapse rootless podman
  ansible.builtin.command:
    argv:
      - podman
      - unshare
      - chown
      - "{{ synapse_runtime_uid }}:{{ synapse_runtime_gid }}"
      - "{{ synapse_data_path }}/mautrix-whatsapp-registration.yaml"
  become: true
  become_user: "{{ ansible_user }}"
  changed_when: false

# 3. Deploy container unit.
- name: Prepare service adapter paths for mautrix-whatsapp
  ansible.builtin.include_role:
    name: service_adapter
    tasks_from: prepare
  vars:
    service_adapter_name: "{{ mautrix_whatsapp_service_name }}"
    service_adapter_user: "{{ ansible_user }}"
    service_adapter_run_script: "{{ app_user_home }}/bin/run-mautrix-whatsapp.sh"

- name: Install mautrix-whatsapp Podman quadlet
  ansible.builtin.include_role:
    name: service_adapter
    tasks_from: write_container
  vars:
    service_adapter_description: "mautrix-whatsapp Matrix bridge"
    service_adapter_image: "{{ mautrix_whatsapp_image }}"
    service_adapter_name: "{{ mautrix_whatsapp_service_name }}"
    service_adapter_pod: matrix-pod
    service_adapter_volumes:
      - "{{ mautrix_whatsapp_data_path }}:/data"

# 4. Wire up service management — adapter handles init-system details.
- name: Register mautrix-whatsapp with service_adapter
  ansible.builtin.import_role:
    name: service_adapter
  vars:
    service_adapter_name: "{{ mautrix_whatsapp_service_name }}"
    service_adapter_user: "{{ ansible_user }}"
    service_adapter_run_script: "{{ app_user_home }}/bin/run-mautrix-whatsapp.sh"

# Flush so registration-file changes trigger a Synapse restart before the play ends.
- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Wait for Synapse to be ready after any restart
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ synapse_port }}/_matrix/client/versions"
    method: GET
    status_code: 200
    validate_certs: false
  register: _synapse_ready
  retries: 36
  delay: 5
  until: _synapse_ready.status == 200
  failed_when: _synapse_ready.status | default(0) != 200
