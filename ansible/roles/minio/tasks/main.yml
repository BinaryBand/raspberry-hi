---
- name: Install MinIO via Homebrew
  ansible.builtin.command:
    cmd: "{{ brew_prefix }}/bin/brew install minio"
    creates: "{{ brew_prefix }}/bin/minio"
  become: true
  become_user: "{{ brew_user }}"
  environment:
    HOME: "/home/{{ brew_user }}"
    PATH: "{{ brew_prefix }}/bin:/usr/bin:/bin"

- name: Fetch MinIO credentials from Bitwarden
  ansible.builtin.set_fact:
    minio_root_user: "{{ lookup('bitwarden', 'minio_root_user') }}"
    minio_root_password: "{{ lookup('bitwarden', 'minio_root_password') }}"
  no_log: true

- name: Write MinIO environment file
  ansible.builtin.template:
    src: minio.env.j2
    dest: /etc/default/minio
    owner: root
    group: root
    mode: "0600"
  become: true
  notify: restart minio
  no_log: true

- name: Install MinIO systemd service
  ansible.builtin.template:
    src: minio.service.j2
    dest: /etc/systemd/system/minio.service
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: restart minio

- name: Enable and start MinIO service
  ansible.builtin.systemd:
    name: "{{ minio_service_name }}"
    enabled: true
    state: started
    daemon_reload: true
  become: true
