---
# Fetch erron's UID once — needed to address the user's systemd socket.
- name: Get UID of {{ brew_user }}
  ansible.builtin.command: "id -u {{ brew_user }}"
  register: _brew_user_uid_out
  changed_when: false

- name: Set brew_user_uid fact
  ansible.builtin.set_fact:
    brew_user_uid: "{{ _brew_user_uid_out.stdout }}"

# Remove the legacy Homebrew system service if it exists so it doesn't hold
# ports 9000/9001 and block the Podman container from starting.
- name: Stop and disable legacy minio system service if present
  ansible.builtin.systemd:
    name: minio
    state: stopped
    enabled: false
  become: true
  failed_when: false

- name: Remove legacy minio system service unit file
  ansible.builtin.file:
    path: /etc/systemd/system/minio.service
    state: absent
  become: true

# Config dirs and files are root-created to set the correct ownership.
- name: Ensure MinIO config directory exists
  ansible.builtin.file:
    path: "/home/{{ brew_user }}/.config/minio"
    state: directory
    owner: "{{ brew_user }}"
    group: "{{ brew_user }}"
    mode: "0700"
  become: true

- name: Write MinIO environment file
  ansible.builtin.template:
    src: minio.env.j2
    dest: "/home/{{ brew_user }}/.config/minio/minio.env"
    owner: "{{ brew_user }}"
    group: "{{ brew_user }}"
    mode: "0600"
  become: true
  notify: restart minio
  no_log: true

- name: Ensure Podman quadlet directory exists
  ansible.builtin.file:
    path: "/home/{{ brew_user }}/.config/containers/systemd"
    state: directory
    owner: "{{ brew_user }}"
    group: "{{ brew_user }}"
    mode: "0755"
  become: true

- name: Install MinIO Podman quadlet
  ansible.builtin.template:
    src: minio.container.j2
    dest: "/home/{{ brew_user }}/.config/containers/systemd/minio.container"
    owner: "{{ brew_user }}"
    group: "{{ brew_user }}"
    mode: "0644"
  become: true
  notify: restart minio

# Linger lets the user's systemd instance (and its services) survive logout.
- name: Enable linger for {{ brew_user }}
  ansible.builtin.command: "loginctl enable-linger {{ brew_user }}"
  become: true
  changed_when: false
  when: not (minio_skip_linger | default(false))

# Run as the play user (erron) with explicit XDG_RUNTIME_DIR so Ansible can
# reach the user's systemd socket without an interactive login session.
- name: Enable and start MinIO service
  ansible.builtin.systemd:
    name: minio
    scope: user
    state: started
    enabled: true
    daemon_reload: true
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ brew_user_uid }}"
 
# After the service is started, set up buckets and policies using mc
- name: Setup MinIO buckets and public policy
  ansible.builtin.include_tasks: setup_mc_bucket.yml
  when: not (minio_skip_bucket_setup | default(false))
