---
# Ensure MinIO client (`mc`) is present, wait for service, configure alias,
# create bucket if missing, and ensure anonymous download policy.

- name: Detect local connection for minio tasks
  ansible.builtin.set_fact:
    minio_local_run: "{{ (ansible_connection == 'local') | default(false) }}"
    _mc_creds_ready: "{{ (minio_root_user is defined) and (minio_root_password is defined) }}"


- name: Install mc via package (optional)
  ansible.builtin.package:
    name: mc
    state: present
  become: "{{ not minio_local_run }}"
  when: mc_install_method == 'package'

- name: Determine mc download architecture
  ansible.builtin.set_fact:
    mc_dl_arch: >-
      {% if ansible_facts['architecture'] == 'aarch64' %}arm64{% elif ansible_facts['architecture'].startswith('arm') %}arm{% elif ansible_facts['architecture'] == 'x86_64' %}amd64{% else %}{{ ansible_facts['architecture'] }}{% endif %}
  when: mc_install_method == 'binary'

- name: Download MinIO client binary to {{ mc_binary_path }}
  ansible.builtin.get_url:
    url: "https://dl.min.io/client/mc/release/linux-{{ mc_dl_arch }}/mc"
    dest: "{{ mc_binary_path }}"
    checksum: "{{ mc_checksum | default(omit) }}"
    mode: '0755'
    owner: root
    group: root
  become: "{{ not minio_local_run }}"
  when: mc_install_method == 'binary'

- name: Wait for MinIO TCP port {{ minio_port }} to be available
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ minio_port }}"
    state: started
    timeout: "{{ (mc_wait_retries | int) * (mc_wait_delay | int) }}"

- name: Wait until MinIO health endpoint responds HTTP 200
  ansible.builtin.uri:
    url: "{{ mc_url | default('http://127.0.0.1:' ~ (minio_port|string)) }}/minio/health/ready"
    method: GET
    status_code: 200
    validate_certs: false  # health endpoint is plain HTTP; no cert to validate
  register: minio_health
  retries: "{{ mc_wait_retries }}"
  delay: "{{ mc_wait_delay }}"
  until: minio_health.status == 200
  failed_when: false

- name: Ensure mc config directory exists
  ansible.builtin.file:
    path: "{{ brew_home }}/.mc"
    state: directory
    owner: "{{ brew_user }}"
    group: "{{ brew_user }}"
    mode: "0700"
  become: "{{ not minio_local_run }}"

- name: Write mc `config.json` with MinIO alias (no_log)
  ansible.builtin.copy:
    dest: "{{ brew_home }}/.mc/config.json"
    content: |
      {
        "version": "10",
        "hosts": {
          "{{ mc_alias }}": {
            "url": "{{ mc_url | default('http://127.0.0.1:' ~ (minio_port|string)) }}",
            "accessKey": "{{ minio_root_user }}",
            "secretKey": "{{ minio_root_password }}",
            "api": "S3v4",
            "lookup": "auto"
          }
        }
      }
    owner: "{{ brew_user }}"
    group: "{{ brew_user }}"
    mode: "0600"
  become: "{{ not minio_local_run }}"
  no_log: true
  when: _mc_creds_ready

- name: Check whether {{ mc_alias }}/{{ mc_bucket }} exists
  ansible.builtin.command: "mc ls {{ mc_alias }}/{{ mc_bucket }}"
  become: "{{ not minio_local_run }}"
  become_user: "{{ brew_user }}"
  environment:
    HOME: "{{ brew_home }}"
    TERM: "xterm"
  register: mc_bucket_check
  failed_when: false
  changed_when: false
  when: _mc_creds_ready

- name: Create bucket {{ mc_bucket }} if missing
  ansible.builtin.command: "mc mb {{ mc_alias }}/{{ mc_bucket }}"
  become: "{{ not minio_local_run }}"
  become_user: "{{ brew_user }}"
  environment:
    HOME: "{{ brew_home }}"
    TERM: "xterm"
  when:
    - mc_bucket_check is defined
    - mc_bucket_check.rc != 0
  register: mc_bucket_mb
  failed_when: mc_bucket_mb.rc != 0
  changed_when: mc_bucket_mb.rc == 0

- name: Try mc anonymous set (preferred in newer mc)
  ansible.builtin.command: "mc anonymous set {{ mc_policy }} {{ mc_alias }}/{{ mc_bucket }}"
  become: "{{ not minio_local_run }}"
  become_user: "{{ brew_user }}"
  environment:
    HOME: "{{ brew_home }}"
    TERM: "xterm"
  register: mc_anon_set
  failed_when: false
  changed_when: mc_anon_set.rc == 0
  when: _mc_creds_ready

- name: Ensure anonymous/download policy on {{ mc_alias }}/{{ mc_bucket }} (legacy)
  ansible.builtin.command: "mc policy set {{ mc_policy }} {{ mc_alias }}/{{ mc_bucket }}"
  become: "{{ not minio_local_run }}"
  become_user: "{{ brew_user }}"
  environment:
    HOME: "{{ brew_home }}"
    TERM: "xterm"
  register: mc_policy_set
  failed_when: false
  changed_when: mc_policy_set.rc == 0
  when:
    - _mc_creds_ready
    - mc_anon_set is not defined or mc_anon_set.rc != 0

