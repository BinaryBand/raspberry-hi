---
# Install system-level Homebrew dependencies (Debian/Ubuntu only).
- name: Install Homebrew system dependencies
  ansible.builtin.apt:
    name:
      - build-essential
      - procps
      - curl
      - file
      - git
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true
  when: ansible_facts['pkg_mgr'] == "apt"

- name: Check if Homebrew is already installed
  ansible.builtin.stat:
    path: "{{ brew_prefix }}/bin/brew"
  register: brew_binary
  changed_when: false

# On Linux, Homebrew must be installed as the target user (not root).
- name: Install Homebrew (Linux)
  ansible.builtin.shell:
    cmd: >
      NONINTERACTIVE=1 /bin/bash -c
      "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  become: true
  become_user: "{{ brew_user }}"
  when:
    - not brew_binary.stat.exists
    - ansible_facts['system'] != "Darwin"
  environment:
    HOME: "{{ brew_home }}"

# On macOS, run the installer as the current user (no privilege escalation needed).
- name: Install Homebrew (macOS)
  ansible.builtin.shell:
    cmd: >
      NONINTERACTIVE=1 /bin/bash -c
      "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  when:
    - not brew_binary.stat.exists
    - ansible_facts['system'] == "Darwin"
  environment:
    HOME: "{{ brew_home }}"
