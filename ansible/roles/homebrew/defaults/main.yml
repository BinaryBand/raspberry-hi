---
# brew_user and brew_home follow ansible_user — set ansible_user in hosts.ini and these resolve automatically.
# Override in host_vars only if the user's home directory is non-standard.
brew_home: "{{ '/Users' if ansible_system == 'Darwin' else '/home' }}/{{ brew_user }}"

# Homebrew prefix differs by OS and architecture.
#   Linux            → /home/linuxbrew/.linuxbrew
#   macOS arm64      → /opt/homebrew
#   macOS x86_64     → /usr/local
brew_prefix: >-
  {%- if ansible_system == 'Darwin' -%}
    {%- if ansible_architecture == 'arm64' -%}/opt/homebrew
    {%- else -%}/usr/local
    {%- endif -%}
  {%- else -%}/home/linuxbrew/.linuxbrew
  {%- endif -%}

# Shell profile to add Homebrew's shellenv initialisation to.
brew_shell_profile: "{{ '.zprofile' if ansible_system == 'Darwin' else '.bashrc' }}"
