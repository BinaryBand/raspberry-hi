---
# manual adapter: deploys a run script and prints operator instructions.
# No boot integration — the operator wires it into their init system manually.

- name: Ensure service bin directory exists
  ansible.builtin.file:
    path: "{{ service_adapter_run_script | dirname }}"
    state: directory
    owner: "{{ service_adapter_user }}"
    group: "{{ service_adapter_user }}"
    mode: "0755"
  become: true

- name: Deploy run script for {{ service_adapter_name }}
  ansible.builtin.template:
    src: run-container.sh.j2
    dest: "{{ service_adapter_run_script }}"
    owner: "{{ service_adapter_user }}"
    group: "{{ service_adapter_user }}"
    mode: "0755"
  become: true

- name: Remind operator to start service manually {{ service_adapter_name }}
  ansible.builtin.debug:
    msg: >-
      Service '{{ service_adapter_name }}' deployed but not started.
      Run: {{ service_adapter_run_script }}
      To persist across reboots, wire this script into your init system manually.
