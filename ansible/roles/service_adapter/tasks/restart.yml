---
# Called directly via: include_role: name=service_adapter tasks_from=restart

- name: Get UID of {{ svc_user }}
  ansible.builtin.command: "id -u {{ svc_user }}"
  register: _svc_restart_uid
  changed_when: false
  when: service_adapter_backend == 'systemd'

- name: Restart via systemd {{ svc_name }}
  ansible.builtin.systemd:
    name: "{{ svc_name }}"
    scope: user
    state: restarted
    daemon_reload: true
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ _svc_restart_uid.stdout | trim }}"
  become: true
  become_user: "{{ svc_user }}"
  when: service_adapter_backend == 'systemd'

- name: Restart via script {{ svc_name }}
  ansible.builtin.command: "{{ svc_run_script }}"
  become: true
  become_user: "{{ svc_user }}"
  changed_when: true
  when: service_adapter_backend != 'systemd'
