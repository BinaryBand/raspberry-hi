---
# Called by app handlers via: import_role: name=service_adapter tasks_from=restart
# Requires _svc_user_uid to be set (populated by adapter_systemd.yml on first run).

- name: Restart {{ svc_name }} (systemd)
  ansible.builtin.systemd:
    name: "{{ svc_name }}"
    scope: user
    state: restarted
    daemon_reload: true
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ _svc_user_uid }}"
  when: service_adapter_backend == 'systemd'

- name: Restart {{ svc_name }} (re-run script)
  ansible.builtin.command: "{{ svc_run_script }}"
  become: true
  become_user: "{{ svc_user }}"
  when: service_adapter_backend != 'systemd'
