---
- name: Import rclone playbook
  import_playbook: ../rclone/playbook.yml

- name: Import caddy playbook
  import_playbook: ../caddy/playbook.yml

- name: Provision jellyfin
  hosts: devices
  gather_facts: true

  pre_tasks:
    - name: Load common pre-tasks
      ansible.builtin.import_tasks: ../../tasks/pre_tasks.yml

  roles:
    - role: jellyfin
