---
# 0. App-specific: data and config directories.
- name: Ensure Baikal config directory exists
  ansible.builtin.file:
    path: "{{ baikal_config_path }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0750"
  become: true

- name: Ensure Baikal data directory exists
  ansible.builtin.file:
    path: "{{ baikal_data_path }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0750"
  become: true

- name: Assert required Baikal variables are set
  ansible.builtin.assert:
    that:
      - baikal_admin_password is defined
      - baikal_encryption_key is defined
      - baikal_config_path is defined
      - baikal_data_path is defined
    fail_msg: "Baikal required variables missing: ensure admin password, encryption key, and config/data paths are set."

- name: Assert PostgreSQL credentials are set for pgsql backend
  ansible.builtin.assert:
    that:
      - baikal_db_password is defined and baikal_db_password | length > 0
    fail_msg: "baikal_db_backend is 'pgsql' but baikal_db_password is not set in vault."
  when: baikal_db_backend == 'pgsql'

- name: Provision Baikal PostgreSQL database
  ansible.builtin.include_role:
    name: postgres
    tasks_from: ensure_app_db
  vars:
    postgres_db_user: "{{ baikal_db_user }}"
    postgres_db_name: "{{ baikal_db_name }}"
    postgres_db_password: "{{ baikal_db_password }}"
  when: baikal_db_backend == 'pgsql'

- name: Install Baikal application config
  ansible.builtin.template:
    src: baikal.yaml.j2
    dest: "{{ baikal_config_path }}/baikal.yaml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
  become: true
  notify: restart baikal
  no_log: true

- name: Check Baikal writable directory owners in podman user namespace
  ansible.builtin.command:
    argv:
      - podman
      - unshare
      - stat
      - -c
      - "%u:%g"
      - "{{ item }}"
  become: true
  become_user: "{{ ansible_user }}"
  loop:
    - "{{ baikal_config_path }}"
    - "{{ baikal_data_path }}"
  loop_control:
    label: "{{ item }}"
  register: _baikal_dir_owners
  changed_when: false

- name: Fix Baikal writable directory ownership for rootless podman
  ansible.builtin.command:
    argv:
      - podman
      - unshare
      - chown
      - -R
      - "{{ baikal_runtime_uid }}:{{ baikal_runtime_gid }}"
      - "{{ baikal_dir_owner.item }}"
  become: true
  become_user: "{{ ansible_user }}"
  loop: "{{ _baikal_dir_owners.results }}"
  loop_control:
    loop_var: baikal_dir_owner
    label: "{{ baikal_dir_owner.item }}"
  when: baikal_dir_owner.stdout | trim != (baikal_runtime_uid | string ~ ':' ~ baikal_runtime_gid | string)
  changed_when: true
  notify: restart baikal

# 2. Pre-pull the image to avoid systemd timing out on slow connections.
- name: Pull Baikal container image
  ansible.builtin.command:
    argv:
      - podman
      - pull
      - "{{ baikal_image }}"
  become: true
  become_user: "{{ ansible_user }}"
  register: _baikal_pull
  changed_when: "'Copying' in _baikal_pull.stdout"

# 3. Deploy container unit.
- name: Prepare service adapter paths for Baikal
  ansible.builtin.include_role:
    name: service_adapter
    tasks_from: prepare
  vars:
    service_adapter_name: "{{ baikal_service_name }}"
    service_adapter_user: "{{ ansible_user }}"
    service_adapter_run_script: "{{ app_user_home }}/bin/run-baikal.sh"

- name: Install Baikal Podman quadlet
  ansible.builtin.include_role:
    name: service_adapter
    tasks_from: write_container
  vars:
    service_adapter_description: "Baikal CalDAV/CardDAV Server"
    service_adapter_image: "{{ baikal_image }}"
    service_adapter_name: "{{ baikal_service_name }}"
    service_adapter_ports:
      - "{{ baikal_port }}:80"
    service_adapter_volumes:
      - "{{ baikal_config_path }}:/var/www/baikal/config"
      - "{{ baikal_data_path }}:/var/www/baikal/Specific"

# 4. Wire up service management — adapter handles init-system details.
- name: Register Baikal with service_adapter
  ansible.builtin.import_role:
    name: service_adapter
  vars:
    service_adapter_name: "{{ baikal_service_name }}"
    service_adapter_user: "{{ ansible_user }}"
    service_adapter_run_script: "{{ app_user_home }}/bin/run-baikal.sh"
