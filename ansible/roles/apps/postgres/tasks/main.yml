---
- name: Assert postgres_data_path is set
  ansible.builtin.assert:
    that: postgres_data_path is not none
    fail_msg: >-
      postgres_data_path is not set for '{{ inventory_hostname }}'.
      Add it to ansible/inventory/host_vars/{{ inventory_hostname }}.yml:
        postgres_data_path: /home/linux-hi/postgres

- name: Ensure PostgreSQL data directory exists
  ansible.builtin.file:
    path: "{{ postgres_data_path }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0750"
  become: true

- name: Check PostgreSQL data directory owner in podman user namespace
  ansible.builtin.command:
    argv:
      - podman
      - unshare
      - stat
      - -c
      - "%u"
      - "{{ postgres_data_path }}"
  become: true
  become_user: "{{ ansible_user }}"
  register: _postgres_data_uid
  changed_when: false

- name: Fix PostgreSQL data directory ownership for rootless podman
  ansible.builtin.command:
    argv:
      - podman
      - unshare
      - chown
      - -R
      - "{{ postgres_runtime_uid }}:{{ postgres_runtime_gid }}"
      - "{{ postgres_data_path }}"
  become: true
  become_user: "{{ ansible_user }}"
  when: _postgres_data_uid.stdout | trim != (postgres_runtime_uid | string)
  changed_when: true
  notify: restart postgres

- name: Ensure PostgreSQL config directory exists
  ansible.builtin.file:
    path: "{{ app_user_home }}/.config/postgres"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0700"
  become: true

- name: Install PostgreSQL pg_hba.conf
  ansible.builtin.template:
    src: postgres.hba.conf.j2
    dest: "{{ postgres_hba_host_path }}"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
  become: true
  notify: restart postgres

- name: Write PostgreSQL environment file
  ansible.builtin.template:
    src: postgres.env.j2
    dest: "{{ app_user_home }}/.config/postgres/postgres.env"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
  become: true
  notify: restart postgres
  no_log: true

- name: Prepare service adapter paths for PostgreSQL
  ansible.builtin.include_role:
    name: service_adapter
    tasks_from: prepare
  vars:
    service_adapter_name: "{{ postgres_service_name }}"
    service_adapter_user: "{{ ansible_user }}"
    service_adapter_run_script: "{{ app_user_home }}/bin/run-postgres.sh"

- name: Write matrix-pod quadlet
  ansible.builtin.include_role:
    name: service_adapter
    tasks_from: write_pod
  vars:
    service_adapter_pod_name: matrix-pod
    service_adapter_user: "{{ ansible_user }}"
    service_adapter_pod_description: Matrix services pod (postgres, synapse, mautrix-whatsapp)
    service_adapter_pod_ports:
      - "{{ postgres_port }}:5432"
      - "{{ synapse_port }}:{{ synapse_port }}"
      - "{{ mautrix_whatsapp_port }}:{{ mautrix_whatsapp_port }}"

- name: Install PostgreSQL Podman quadlet
  ansible.builtin.include_role:
    name: service_adapter
    tasks_from: write_container
  vars:
    service_adapter_description: "PostgreSQL Database"
    service_adapter_image: "{{ postgres_image }}"
    service_adapter_name: "{{ postgres_service_name }}"
    service_adapter_pod: matrix-pod
    service_adapter_volumes:
      - "{{ postgres_data_path }}:/var/lib/postgresql/data"
      - "{{ postgres_hba_host_path }}:{{ postgres_hba_container_path }}:ro"
    service_adapter_exec: "postgres -c hba_file={{ postgres_hba_container_path }}"
    service_adapter_env_file: "{{ app_user_home }}/.config/postgres/postgres.env"

- name: Register PostgreSQL with service_adapter
  ansible.builtin.import_role:
    name: service_adapter
  vars:
    service_adapter_name: "{{ postgres_service_name }}"
    service_adapter_user: "{{ ansible_user }}"
    service_adapter_run_script: "{{ app_user_home }}/bin/run-postgres.sh"

- name: Apply pending PostgreSQL handler changes
  ansible.builtin.meta: flush_handlers
