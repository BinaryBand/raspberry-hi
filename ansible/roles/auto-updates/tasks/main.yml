---
# Automatic security updates are managed via unattended-upgrades on Debian/Ubuntu.
# On other OS families (e.g. macOS) this role is a no-op.

- name: Skip auto-updates on non-Debian systems
  ansible.builtin.debug:
    msg: "auto-updates role skipped — unattended-upgrades is not available on {{ ansible_os_family }}."
  when: ansible_pkg_mgr != "apt"

- name: Install unattended-upgrades
  ansible.builtin.apt:
    name:
      - unattended-upgrades
      - apt-listchanges
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: ansible_pkg_mgr == "apt"

- name: Enable automatic security updates
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
    owner: root
    group: root
    mode: "0644"
  when: ansible_pkg_mgr == "apt"

- name: Configure unattended-upgrades for security origins
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    content: |
      Unattended-Upgrade::Allowed-Origins {
          "${distro_id}:${distro_codename}-security";
          "${distro_id}ESMApps:${distro_codename}-apps-security";
          "${distro_id}ESM:${distro_codename}-infra-security";
      };
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
      Unattended-Upgrade::Automatic-Reboot "true";
      Unattended-Upgrade::Automatic-Reboot-Time "03:00";
    owner: root
    group: root
    mode: "0644"
  when: ansible_pkg_mgr == "apt"

- name: Ensure unattended-upgrades service is enabled and running
  ansible.builtin.service:
    name: unattended-upgrades
    enabled: true
    state: started
  when: ansible_pkg_mgr == "apt"
