---

- name: Skip auto-updates when disabled
  ansible.builtin.debug:
    msg: "auto-updates role skipped because auto_updates_enabled=false"
  when: not auto_updates_enabled | bool

- name: Assert supported package manager
  ansible.builtin.assert:
    that:
      - ansible_facts['pkg_mgr'] in auto_updates_supported_managers
    fail_msg: >-
      auto-updates role does not support package manager '{{ ansible_facts['pkg_mgr'] }}'.
      Supported managers: {{ auto_updates_supported_managers | join(', ') }}.
  when:
    - auto_updates_enabled | bool
    - auto_updates_fail_on_unsupported | bool

- name: Skip unsupported package manager (non-strict mode)
  ansible.builtin.debug:
    msg: >-
      auto-updates role skipped for unsupported package manager '{{ ansible_facts['pkg_mgr'] }}'.
      Supported managers: {{ auto_updates_supported_managers | join(', ') }}.
  when:
    - auto_updates_enabled | bool
    - not auto_updates_fail_on_unsupported | bool
    - ansible_facts['pkg_mgr'] not in auto_updates_supported_managers

- name: Configure auto-updates (apt)
  ansible.builtin.include_tasks: pkg_apt.yml
  when:
    - auto_updates_enabled | bool
    - ansible_facts['pkg_mgr'] == 'apt'

- name: Configure auto-updates (dnf)
  ansible.builtin.include_tasks: pkg_dnf.yml
  when:
    - auto_updates_enabled | bool
    - ansible_facts['pkg_mgr'] == 'dnf'
