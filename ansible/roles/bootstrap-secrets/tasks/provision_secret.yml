---
- name: "Check if '{{ secret_item.name }}' exists in Bitwarden"
  ansible.builtin.shell: |
    bw list items --search "{{ secret_item.name }}" | python3 -c "
    import sys, json
    items = json.load(sys.stdin)
    matched = [i for i in items if i.get('name') == '{{ secret_item.name }}']
    sys.exit(0 if matched else 1)
    "
  delegate_to: localhost
  changed_when: false
  failed_when: false
  no_log: true
  register: _secret_check
  environment:
    BW_SESSION: "{{ _bw_session }}"

- name: "Prompt for {{ secret_item.description }}"
  ansible.builtin.pause:
    prompt: "Enter {{ secret_item.description }} [{{ secret_item.name }}]"
    echo: false
  delegate_to: localhost
  when: _secret_check.rc != 0
  register: _secret_prompt
  no_log: true

- name: "Write '{{ secret_item.name }}' to Bitwarden"
  ansible.builtin.shell: |
    python3 -c "
    import json, os
    item = {
        'type': 1,
        'name': os.environ['ITEM_NAME'],
        'login': {'password': os.environ['ITEM_VALUE']}
    }
    print(json.dumps(item))
    " | bw encode | bw create item
  delegate_to: localhost
  when: _secret_check.rc != 0
  no_log: true
  changed_when: true
  environment:
    BW_SESSION: "{{ _bw_session }}"
    ITEM_NAME: "{{ secret_item.name }}"
    ITEM_VALUE: "{{ _secret_prompt.user_input }}"

- name: Sync Bitwarden vault after write
  ansible.builtin.command: bw sync
  delegate_to: localhost
  when: _secret_check.rc != 0
  changed_when: false
  environment:
    BW_SESSION: "{{ _bw_session }}"
