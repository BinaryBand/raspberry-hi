---
# 0. Guard: fail fast if required variables are absent or platform is unsupported.
- name: Verify rclone_config secret is present
  ansible.builtin.assert:
    that: rclone_config is defined and rclone_config | length > 0
    fail_msg: >-
      rclone_config is not set in vault.
      Run 'make rclone' to capture your local rclone config into the vault.

# 1. Install: assert supported platform, then route to pkg_<mgr>.yml.
- name: Assert supported package manager
  ansible.builtin.assert:
    that: ansible_facts['pkg_mgr'] in rclone_supported_managers
    fail_msg: >-
      Package manager '{{ ansible_facts["pkg_mgr"] }}' is not supported by the rclone role.
      Supported: {{ rclone_supported_managers | join(', ') }}.
  when: rclone_fail_on_unsupported

- name: Skip unsupported package manager (non-strict mode)
  ansible.builtin.meta: end_play
  when: not rclone_fail_on_unsupported and ansible_facts['pkg_mgr'] not in rclone_supported_managers

- name: Install rclone ({{ ansible_facts['pkg_mgr'] }})
  ansible.builtin.include_tasks: "pkg_{{ ansible_facts['pkg_mgr'] }}.yml"
  when: ansible_facts['pkg_mgr'] in rclone_supported_managers

# 2. Configure: deploy rclone config.
- name: Ensure rclone config directory exists
  ansible.builtin.file:
    path: "{{ app_user_home }}/.config/rclone"
    state: directory
    mode: "0700"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  become: true

- name: Deploy rclone config
  ansible.builtin.template:
    src: rclone.conf.j2
    dest: "{{ rclone_config_path }}"
    mode: "0600"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  become: true
