---
# 0a. Declarative routing: build caddy_routes from forwards.yml for this host.
- name: Collect forwards for this host from forwards.yml
  ansible.builtin.set_fact:
    _caddy_host_forwards: >-
      {{
        (reverse_proxies | default([]))
        | selectattr('host', 'equalto', inventory_hostname)
        | list
      }}

- name: Skip caddy — no forwards declared for this host
  ansible.builtin.meta: end_play
  when: _caddy_host_forwards | length == 0

- name: Build caddy_routes from host forwards and app port vars
  vars:
    _routes: >-
      {%- set routes = [] -%}
      {%- for fwd in _caddy_host_forwards -%}
        {%- set port_key = fwd.service | replace('-', '_') ~ '_port' -%}
        {%- set _ = routes.append({
          'host': fwd.service,
          'external': fwd.domain,
          'internal': 'localhost:' ~ vars[port_key]
        }) -%}
      {%- endfor -%}
      {{ routes }}
  ansible.builtin.set_fact:
    caddy_routes: "{{ _routes }}"

# 0b. Guard: fail fast if required variables are not configured.
- name: Assert caddy_acme_email is set
  ansible.builtin.assert:
    that: caddy_acme_email is not none
    fail_msg: >-
      caddy_acme_email is not set for '{{ inventory_hostname }}'.
      Add it to ansible/inventory/host_vars/{{ inventory_hostname }}.yml:
        caddy_acme_email: you@example.com

- name: Assert caddy_routes has no duplicate host labels
  ansible.builtin.assert:
    that: >-
      caddy_routes | map(attribute='host') | list | unique | length ==
      caddy_routes | length
    fail_msg: "caddy_routes contains duplicate host labels for '{{ inventory_hostname }}'."

- name: Assert caddy_routes has no duplicate external addresses
  ansible.builtin.assert:
    that: >-
      caddy_routes | map(attribute='external') | list | unique | length ==
      caddy_routes | length
    fail_msg: "caddy_routes contains duplicate external addresses for '{{ inventory_hostname }}'."

- name: Assert caddy_routes has no duplicate internal addresses
  ansible.builtin.assert:
    that: >-
      caddy_routes | map(attribute='internal') | list | unique | length ==
      caddy_routes | length
    fail_msg: "caddy_routes contains duplicate internal addresses for '{{ inventory_hostname }}'."

# 1. Install: assert supported platform, then route to pkg_<mgr>.yml.
- name: Assert supported package manager
  ansible.builtin.assert:
    that: ansible_facts['pkg_mgr'] in caddy_supported_managers
    fail_msg: >-
      Package manager '{{ ansible_facts["pkg_mgr"] }}' is not supported by the caddy role.
      Supported: {{ caddy_supported_managers | join(', ') }}.
  when: caddy_fail_on_unsupported

- name: Skip unsupported package manager (non-strict mode)
  ansible.builtin.meta: end_play
  when: not caddy_fail_on_unsupported and ansible_facts['pkg_mgr'] not in caddy_supported_managers

- name: Install caddy ({{ ansible_facts['pkg_mgr'] }})
  ansible.builtin.include_tasks: "pkg_{{ ansible_facts['pkg_mgr'] }}.yml"
  when: ansible_facts['pkg_mgr'] in caddy_supported_managers

# 2. Configure: ensure custom data directory exists and is owned by the caddy system user.
- name: Ensure Caddy data directory exists
  ansible.builtin.file:
    path: "{{ caddy_data_path }}"
    state: directory
    owner: caddy
    group: caddy
    mode: "0750"
  become: true
  when: caddy_data_path != '/var/lib/caddy'

# 3. Service setup: deploy Caddyfile and enable the service.
- name: Install Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    owner: root
    group: caddy
    mode: "0640"
  become: true
  notify: restart caddy

# (service continued)
- name: Enable and start caddy service
  ansible.builtin.systemd:
    name: caddy
    state: started
    enabled: true
    daemon_reload: true
  become: true
