---
# cron adapter: deploys a run script and schedules it via @reboot cron.
# No restart-on-failure; no boot-ordering guarantee beyond the mount wait loop
# in the run script template.

- name: Ensure service bin directory exists
  ansible.builtin.file:
    path: "{{ service_adapter_run_script | dirname }}"
    state: directory
    owner: "{{ service_adapter_user }}"
    group: "{{ service_adapter_user }}"
    mode: "0755"
  become: true

- name: Deploy run script for {{ service_adapter_name }}
  ansible.builtin.template:
    src: run-container.sh.j2
    dest: "{{ service_adapter_run_script }}"
    owner: "{{ service_adapter_user }}"
    group: "{{ service_adapter_user }}"
    mode: "0755"
  become: true

- name: Schedule service via @reboot cron {{ service_adapter_name }}
  ansible.builtin.cron:
    name: "{{ service_adapter_name }}-start"
    special_time: reboot
    job: "{{ service_adapter_run_script }}"
    cron_file: "{{ service_adapter_name }}"
    user: "{{ service_adapter_user }}"
