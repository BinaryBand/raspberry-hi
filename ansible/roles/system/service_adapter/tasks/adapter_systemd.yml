---
# systemd adapter: resolves user UID, ensures linger, starts and enables the
# service unit via the user's systemd socket.

- name: Get UID of {{ service_adapter_user }}
  ansible.builtin.command: "id -u {{ service_adapter_user }}"
  register: _service_adapter_user_uid_out
  changed_when: false

- name: Set _service_adapter_user_uid fact
  ansible.builtin.set_fact:
    _service_adapter_user_uid: "{{ _service_adapter_user_uid_out.stdout }}"

- name: Ensure Podman quadlet directory exists
  ansible.builtin.file:
    path: "{{ app_user_home }}/.config/containers/systemd"
    state: directory
    owner: "{{ service_adapter_user }}"
    group: "{{ service_adapter_user }}"
    mode: "0755"
  become: true

- name: Check linger status for {{ service_adapter_user }}
  ansible.builtin.command: "loginctl show-user {{ service_adapter_user }} -p Linger --value"
  register: _service_adapter_linger_status
  become: true
  changed_when: false
  failed_when: false

- name: Enable linger for {{ service_adapter_user }}
  ansible.builtin.command: "loginctl enable-linger {{ service_adapter_user }}"
  become: true
  changed_when: true
  when: _service_adapter_linger_status.stdout | default('') != 'yes'

- name: Enable and start service {{ service_adapter_name }}
  ansible.builtin.systemd:
    name: "{{ service_adapter_name }}"
    scope: user
    state: started
    enabled: true
    daemon_reload: true
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ _service_adapter_user_uid }}"
