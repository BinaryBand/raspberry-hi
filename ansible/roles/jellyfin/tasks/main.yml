---
- name: Get UID of {{ brew_user }}
  ansible.builtin.command: "id -u {{ brew_user }}"
  register: _brew_user_uid_out
  changed_when: false

- name: Set brew_user_uid fact
  ansible.builtin.set_fact:
    brew_user_uid: "{{ _brew_user_uid_out.stdout }}"

# Wire up the Jellyfin media directory only when the rclone mount is live.
# Mount point creation and ownership are managed by the rclone role.
- name: Check if media mount is active
  ansible.builtin.command: mountpoint -q {{ media_mount_path }}
  register: media_mounted
  failed_when: false
  changed_when: false

- name: Set jellyfin_media_dir fact when mount is active
  ansible.builtin.set_fact:
    jellyfin_media_dir: "{{ media_mount_path }}"
  when: media_mounted.rc == 0

- name: Ensure Jellyfin config directory exists
  ansible.builtin.file:
    path: "{{ jellyfin_config_path }}"
    state: directory
    owner: "{{ brew_user }}"
    group: "{{ brew_user }}"
    mode: "0750"

- name: Ensure Jellyfin cache directory exists
  ansible.builtin.file:
    path: "{{ jellyfin_cache_path }}"
    state: directory
    owner: "{{ brew_user }}"
    group: "{{ brew_user }}"
    mode: "0750"

- name: Ensure Podman quadlet directory exists
  ansible.builtin.file:
    path: "/home/{{ brew_user }}/.config/containers/systemd"
    state: directory
    owner: "{{ brew_user }}"
    group: "{{ brew_user }}"
    mode: "0755"

# Pull the image before the quadlet is installed so service start/restart
# is fast and never races against a slow download.
- name: Pull Jellyfin container image
  ansible.builtin.command: podman pull {{ jellyfin_image }}
  become: false
  register: _jellyfin_pull
  changed_when: "'Copying' in _jellyfin_pull.stdout"
  timeout: 600

- name: Install Jellyfin Podman quadlet
  ansible.builtin.template:
    src: jellyfin.container.j2
    dest: "/home/{{ brew_user }}/.config/containers/systemd/jellyfin.container"
    owner: "{{ brew_user }}"
    group: "{{ brew_user }}"
    mode: "0644"
  notify: restart jellyfin

- name: Enable linger for {{ brew_user }}
  ansible.builtin.command: "loginctl enable-linger {{ brew_user }}"
  changed_when: false

- name: Enable and start Jellyfin service
  ansible.builtin.systemd:
    name: jellyfin
    scope: user
    state: started
    enabled: true
    daemon_reload: true
  become: false
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ brew_user_uid }}"
