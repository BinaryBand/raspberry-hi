---
# Path where rclone mounts the cloud media remote.
# Override in group_vars or host_vars if the mount point differs.
media_mount_path: /mnt/media

# Container image to use for Jellyfin.
jellyfin_image: jellyfin/jellyfin:latest

# Port Jellyfin listens on inside the container (and exposed on the host).
jellyfin_port: 8096
