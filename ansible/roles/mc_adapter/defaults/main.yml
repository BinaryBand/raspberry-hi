---
# How to install the MinIO client (mc).
# binary  — download from dl.min.io (default; works on any arch)
# package — install via the host's package manager (if mc is packaged)
# skip    — assert mc is already present at mc_binary_path; abort if not
mc_install_method: binary

mc_binary_path: /usr/local/bin/mc

# Pin to a specific release. Leave empty to fetch latest (not recommended).
# Find checksums at: https://dl.min.io/client/mc/release/linux-<arch>/mc.sha256sum
mc_version: ""
mc_checksum: ""
