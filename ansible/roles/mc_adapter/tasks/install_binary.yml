---
# Downloads the mc binary directly from dl.min.io.
# Detects host architecture and selects the matching build.

- name: Determine mc download architecture
  ansible.builtin.set_fact:
    _mc_dl_arch: >-
      {%- if ansible_facts['architecture'] == 'aarch64' -%}arm64
      {%- elif ansible_facts['architecture'].startswith('arm') -%}arm
      {%- elif ansible_facts['architecture'] == 'x86_64' -%}amd64
      {%- else -%}{{ ansible_facts['architecture'] }}
      {%- endif -%}

- name: Download MinIO client binary to {{ mc_binary_path }}
  ansible.builtin.get_url:
    url: >-
      https://dl.min.io/client/mc/release/linux-{{ _mc_dl_arch }}/{% if mc_version %}archive/mc.{{ mc_version }}{% else %}mc{% endif %}
    dest: "{{ mc_binary_path }}"
    checksum: "{{ mc_checksum | default(omit) }}"
    mode: "0755"
    owner: root
    group: root
  become: true
