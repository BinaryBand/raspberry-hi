---
# Port: MinIO client (mc) installation.
# Callers set mc_install_method; this role handles platform-specific details.

- name: Install mc (binary)
  ansible.builtin.include_tasks: install_binary.yml
  when: mc_install_method == 'binary'

- name: Install mc (package)
  ansible.builtin.include_tasks: install_package.yml
  when: mc_install_method == 'package'

- name: Assert mc is present (skip install)
  ansible.builtin.stat:
    path: "{{ mc_binary_path }}"
  register: _mc_stat
  when: mc_install_method == 'skip'

- name: Fail if mc not found (skip mode)
  ansible.builtin.fail:
    msg: >-
      mc_install_method=skip but mc not found at {{ mc_binary_path }}.
      Install mc manually or change mc_install_method.
  when:
    - mc_install_method == 'skip'
    - not _mc_stat.stat.exists
