---
- name: Provision devices
  hosts: devices
  gather_facts: true

  roles:
    - role: auto-updates
      tags: [base]
      become: true

    - role: podman
      tags: [podman]
      become: true

    - role: storage
      tags: [storage]
      become: true

    # App roles live under ansible/apps/ and are excluded from `make site` by default.
    # They are tagged with both [apps] and their own name so they can be run individually.

    # Run `make minio` to provision or re-provision MinIO independently.
    - role: minio
      tags: [apps, minio]
      when: ansible_facts['system'] == "Linux"

    # Run `make baikal` to provision or re-provision Baikal independently.
    - role: baikal
      tags: [apps, baikal]
      when: ansible_facts['system'] == "Linux"
