---
- name: Provision devices
  hosts: devices
  gather_facts: true

  pre_tasks:
    - name: Verify become password is configured for this host
      ansible.builtin.assert:
        that: (become_passwords | default({})).get(inventory_hostname, '') | length > 0
        fail_msg: >-
          become password not set for '{{ inventory_hostname }}'.
          Run 'make bootstrap' to add it.
      tags: [always]

  roles:
    - role: auto-updates
      tags: [base]
      become: true

    - role: podman
      tags: [podman]
      become: true

    # App roles live under ansible/apps/ and are excluded from `make site` by default.
    # They are tagged with both [apps] and their own name so they can be run individually.

    # Run `make minio` to provision or re-provision MinIO independently.
    - role: minio
      tags: [apps, minio]

    # Run `make baikal` to provision or re-provision Baikal independently.
    - role: baikal
      tags: [apps, baikal]
