---
apps:
  minio:
    service_type: containerized
    backup: true
    restore: true
    cleanup: true
    service_name_var: minio_service_name
    dependencies: []
    preflight_vars:
      minio_data_path:
        hint: persistent path for MinIO data
        default: /home/linux-hi/minio
    vault_secrets:
      - key: minio_root_user
        label: MinIO root username
        hidden: false
      - key: minio_root_password
        label: MinIO root password
        hidden: true

  postgres:
    service_type: containerized
    backup: true
    restore: true
    cleanup: true
    service_name_var: postgres_service_name
    dependencies: []
    preflight_vars:
      postgres_data_path:
        hint: storage path for PostgreSQL data files
        default: /home/linux-hi/postgres
    vault_secrets:
      - key: postgres_password
        label: PostgreSQL password for the Baikal application user
        hidden: true

  baikal:
    service_type: containerized
    backup: true
    restore: true
    cleanup: true
    service_name_var: baikal_service_name
    dependencies:
      - postgres
    preflight_vars:
      baikal_config_path:
        hint: directory for Baikal config files and app settings
        default: /home/linux-hi/baikal/config
      baikal_data_path:
        hint: directory for Baikal persistent data files
        default: /home/linux-hi/baikal/data
    vault_secrets:
      - key: baikal_admin_password
        label: Baikal admin password
        hidden: true
      - key: baikal_encryption_key
        label: Baikal encryption key (stable random string)
        hidden: true

  mautrix-whatsapp:
    service_type: containerized
    backup: true
    restore: true
    cleanup: true
    service_name_var: mautrix_whatsapp_service_name
    dependencies:
      - postgres
    preflight_vars:
      mautrix_whatsapp_data_path:
        hint: directory for mautrix-whatsapp config and data
        default: /home/linux-hi/mautrix-whatsapp
      mautrix_whatsapp_homeserver_address:
        hint: "full URL of the Matrix homeserver (e.g. https://example.com)"
        default: ~
      mautrix_whatsapp_homeserver_domain:
        hint: "Matrix server domain (e.g. example.com)"
        default: ~
      mautrix_whatsapp_appservice_address:
        hint: "address where the homeserver can reach the bridge (e.g. http://localhost:29318)"
        default: "http://localhost:29318"
    vault_secrets:
      - key: mautrix_whatsapp_as_token
        label: "mautrix-whatsapp appservice token (leave blank to auto-generate)"
        hidden: true
        generate: true
      - key: mautrix_whatsapp_hs_token
        label: "mautrix-whatsapp homeserver token (leave blank to auto-generate)"
        hidden: true
        generate: true

  restic:
    service_type: tool
    backup: false
    restore: false
    cleanup: false
    dependencies: []
    preflight_vars:
      restic_rclone_remote:
        hint: rclone remote to use for backup storage
        type: rclone_remote
      restic_repo_path:
        hint: path within the rclone remote where the restic repository lives
        default: Backups/linux-hi
    vault_secrets:
      - key: restic_password
        label: Restic repository encryption password
        hidden: true
