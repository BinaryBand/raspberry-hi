---
global_vars:
  app_user_home: "{{ ansible_facts['user_dir'] }}"
  ansible_python_interpreter: auto_silent

apps:
  minio:
    service_type: containerized
    service_name: minio
    image: docker.io/minio/minio:RELEASE.2025-04-08T15-41-24Z
    port: 9000
    backup: true
    restore: true
    cleanup: true
    dependencies: []
    preflight_vars:
      minio_data_path:
        hint: persistent path for MinIO data
        default: /home/linux-hi/minio
    vault_secrets:
      - key: minio_root_user
        label: MinIO root username
        hidden: false
      - key: minio_root_password
        label: MinIO root password
        hidden: true

  postgres:
    service_type: containerized
    service_name: postgres
    image: docker.io/postgres:17.5-alpine
    port: 5432
    runtime_uid: 70
    runtime_gid: 70
    shared_vars:
      postgres_host_access_name: host.containers.internal
      postgres_user: baikal
    backup: true
    restore: true
    cleanup: true
    dependencies: []
    preflight_vars:
      postgres_data_path:
        hint: storage path for PostgreSQL data files
        default: /home/linux-hi/postgres
    vault_secrets:
      - key: postgres_password
        label: PostgreSQL password for the Baikal application user
        hidden: true

  baikal:
    service_type: containerized
    service_name: baikal
    image: docker.io/ckulka/baikal:nginx
    port: 8088
    runtime_uid: 101
    runtime_gid: 101
    backup: true
    restore: true
    cleanup: true
    dependencies:
      - postgres
    preflight_vars:
      baikal_config_path:
        hint: directory for Baikal config files and app settings
        default: /home/linux-hi/baikal/config
      baikal_data_path:
        hint: directory for Baikal persistent data files
        default: /home/linux-hi/baikal/data
    vault_secrets:
      - key: baikal_admin_password
        label: Baikal admin password
        hidden: true
      - key: baikal_encryption_key
        label: Baikal encryption key (stable random string)
        hidden: true

  synapse:
    service_type: containerized
    service_name: synapse
    image: ghcr.io/element-hq/synapse:v1.151.0
    port: 8008
    runtime_uid: 991
    runtime_gid: 991
    backup: true
    restore: true
    cleanup: true
    dependencies:
      - postgres
    preflight_vars:
      synapse_data_path:
        hint: directory for Synapse config, signing key, and media
        default: /home/linux-hi/synapse
      synapse_server_name:
        hint: "Matrix server name / domain (e.g. chat.doreeto.com)"
        default: ~
    vault_secrets:
      - key: synapse_registration_shared_secret
        label: "Synapse registration shared secret (leave blank to auto-generate)"
        hidden: true
        generate: true
      - key: synapse_macaroon_secret_key
        label: "Synapse macaroon secret key (leave blank to auto-generate)"
        hidden: true
        generate: true
      - key: synapse_form_secret
        label: "Synapse form secret (leave blank to auto-generate)"
        hidden: true
        generate: true

  mautrix-whatsapp:
    service_type: containerized
    service_name: mautrix-whatsapp
    image: dock.mau.dev/mautrix/whatsapp:v0.2604.0
    port: 29318
    runtime_uid: 1337
    runtime_gid: 1337
    backup: true
    restore: true
    cleanup: true
    dependencies:
      - synapse
    preflight_vars:
      mautrix_whatsapp_data_path:
        hint: directory for mautrix-whatsapp config and data
        default: /home/linux-hi/mautrix-whatsapp
      mautrix_whatsapp_homeserver_domain:
        hint: "Matrix server domain (e.g. chat.doreeto.com)"
        default: ~
      mautrix_whatsapp_appservice_address:
        hint: "address where Synapse can reach the bridge"
        default: "http://host.containers.internal:29318"
    vault_secrets:
      - key: mautrix_whatsapp_as_token
        label: "mautrix-whatsapp appservice token (leave blank to auto-generate)"
        hidden: true
        generate: true
      - key: mautrix_whatsapp_hs_token
        label: "mautrix-whatsapp homeserver token (leave blank to auto-generate)"
        hidden: true
        generate: true

  restic:
    service_type: tool
    backup: false
    restore: false
    cleanup: false
    dependencies: []
    preflight_vars:
      restic_rclone_remote:
        hint: rclone remote to use for backup storage
        type: rclone_remote
      restic_repo_path:
        hint: path within the rclone remote where the restic repository lives
        default: Backups/linux-hi
    vault_secrets:
      - key: restic_password
        label: Restic repository encryption password
        hidden: true
