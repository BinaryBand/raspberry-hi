---
global_vars:
  app_user_home: "{{ ansible_facts['user_dir'] }}"
  ansible_python_interpreter: auto_silent

apps:
  minio:
    service_type: containerized
    service_name: minio
    image: docker.io/minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    port: 9000
    dependencies: []
    preflight_vars:
      minio_data_path:
        hint: persistent path for MinIO data
        default: /home/linux-hi/minio
        type: path
    vault_secrets:
      - key: minio_root_user
        label: MinIO root username
        hidden: false
      - key: minio_root_password
        label: MinIO root password
        hidden: true

  postgres:
    service_type: containerized
    service_name: postgres
    image: docker.io/postgres@sha256:6567bca8d7bc8c82c5922425a0baee57be8402df92bae5eacad5f01ae9544daa
    port: 5432
    runtime_uid: 70
    runtime_gid: 70
    dependencies: []
    preflight_vars:
      postgres_data_path:
        hint: storage path for PostgreSQL data files
        default: /home/linux-hi/postgres
        type: path
    vault_secrets:
      - key: postgres_password
        label: PostgreSQL superuser password
        hidden: true

  baikal:
    service_type: containerized
    service_name: baikal
    image: docker.io/ckulka/baikal@sha256:1a901125d121a3e414cda87c617bd322c57ae86b9d2aedbff7b3a7ac84bb23aa
    port: 8088
    runtime_uid: 101
    runtime_gid: 101
    dependencies:
      - postgres
    preflight_vars:
      baikal_config_path:
        hint: path for Baikal configuration files
        default: /home/linux-hi/baikal/config
        type: path
      baikal_data_path:
        hint: path for Baikal data storage
        default: /home/linux-hi/baikal/data
        type: path
    vault_secrets:
      - key: baikal_admin_password
        label: Baikal admin password
        hidden: true
      - key: baikal_encryption_key
        label: Baikal encryption key (stable random string)
        hidden: true
      - key: baikal_db_password
        label: Baikal PostgreSQL user password
        hidden: true

  synapse:
    service_type: containerized
    service_name: synapse
    image: ghcr.io/element-hq/synapse@sha256:184dc8757daef019b511e7f96fc6e5edfb880fd074d8cf702c7e3aa899d188c8
    port: 8008
    runtime_uid: 991
    runtime_gid: 991
    dependencies:
      - postgres
    preflight_vars:
      synapse_server_name:
        hint: "Matrix server name / domain (e.g. chat.example.com)"
        default: ~
        type: text
    vault_secrets:
      - key: synapse_registration_shared_secret
        label: "Synapse registration shared secret (leave blank to auto-generate)"
        hidden: true
        generate: true
      - key: synapse_macaroon_secret_key
        label: "Synapse macaroon secret key (leave blank to auto-generate)"
        hidden: true
        generate: true
      - key: synapse_form_secret
        label: "Synapse form secret (leave blank to auto-generate)"
        hidden: true
        generate: true
      - key: synapse_admin_user
        label: "Synapse admin username"
        hidden: false
      - key: synapse_admin_password
        label: "Synapse admin password"
        hidden: true
      - key: synapse_db_password
        label: "Synapse PostgreSQL user password"
        hidden: true

  mautrix-whatsapp:
    service_type: containerized
    service_name: mautrix-whatsapp
    image: dock.mau.dev/mautrix/whatsapp@sha256:224ed2a249800ff380562597b6d880a31a3286c379f797556b361474ea44fa75
    port: 29318
    runtime_uid: 1337
    runtime_gid: 1337
    dependencies:
      - synapse
    preflight_vars:
      mautrix_whatsapp_appservice_address:
        hint: "address where Synapse can reach the bridge"
        default: "http://localhost:29318"
        type: text
    vault_secrets:
      - key: mautrix_whatsapp_as_token
        label: "mautrix-whatsapp appservice token (leave blank to auto-generate)"
        hidden: true
        generate: true
      - key: mautrix_whatsapp_hs_token
        label: "mautrix-whatsapp homeserver token (leave blank to auto-generate)"
        hidden: true
        generate: true
      - key: mautrix_whatsapp_pickle_key
        label: "mautrix-whatsapp E2EE pickle key (leave blank to auto-generate)"
        hidden: true
        generate: true
      - key: mautrix_whatsapp_db_password
        label: "mautrix-whatsapp PostgreSQL user password"
        hidden: true

  caddy:
    service_type: system
    preflight_vars:
      caddy_acme_email:
        hint: "email address for Let's Encrypt ACME certificates"
        type: text

  rclone:
    service_type: system
    vault_secrets:
      - key: rclone_config
        label: "rclone config file contents"
        hidden: false

  jellyfin:
    service_type: containerized
    service_name: jellyfin
    image: docker.io/jellyfin/jellyfin@sha256:7ae36aab93ef9b6aaff02b37f8bb23df84bb2d7a3f6054ec8fc466072a648ce2
    port: 8096
    dependencies:
      - rclone
    preflight_vars:
      jellyfin_media_remote:
        hint: "rclone media library in remote:path format (read-only mount source)"
        default: ~
        type: rclone_remote
    vault_secrets: []
