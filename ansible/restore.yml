---
- name: Restore an app from restic
  hosts: devices
  gather_facts: true

  pre_tasks:
    - name: Verify become password is configured for this host
      ansible.builtin.assert:
        that: (become_passwords | default({})).get(inventory_hostname, '') | length > 0
        fail_msg: >-
          become password not set for '{{ inventory_hostname }}'.
          Run 'make bootstrap' to add it.
      tags: [always]

    - name: Require restore_app variable
      ansible.builtin.assert:
        that: restore_app is defined and restore_app | length > 0
        fail_msg: >-
          restore_app is not set.
          Pass it with: make restore APP=minio  (or postgres, baikal)
      tags: [always]

    - name: Validate restore_app is supported
      ansible.builtin.assert:
        that:
          - restore_app in ['minio', 'postgres', 'baikal']
        fail_msg: >-
          restore_app '{{ restore_app }}' is not supported.
          Supported restore apps: minio, postgres, baikal.
      tags: [always]

    - name: Confirm destructive operation
      ansible.builtin.pause:
        prompt: >-
          WARNING: This will OVERWRITE all data for '{{ restore_app }}'
          on '{{ inventory_hostname }}' with the latest restic snapshot.
          Type 'yes' to continue
      register: _restore_confirm
      when: not (restore_skip_confirm | default(false) | bool)
      tags: [always]

    - name: Abort if not confirmed
      ansible.builtin.fail:
        msg: "Restore aborted."
      when:
        - not (restore_skip_confirm | default(false) | bool)
        - _restore_confirm.user_input | default('') != 'yes'
      tags: [always]

    - name: Set service name and path defaults
      ansible.builtin.set_fact:
        minio_service_name: "{{ minio_service_name | default('minio') }}"
        postgres_service_name: "{{ postgres_service_name | default('postgres') }}"
        postgres_database: "{{ postgres_database | default('baikal') }}"
        postgres_user: "{{ postgres_user | default('baikal') }}"
        postgres_runtime_uid: "{{ postgres_runtime_uid | default(70) }}"
        postgres_runtime_gid: "{{ postgres_runtime_gid | default(70) }}"
        baikal_service_name: "{{ baikal_service_name | default('baikal') }}"
      tags: [always]

  tasks:
    - name: Restore MinIO
      ansible.builtin.include_tasks:
        file: "{{ playbook_dir }}/apps/minio/restore/main.yml"
      when: restore_app == 'minio'
      tags: [minio]

    - name: Restore PostgreSQL
      ansible.builtin.include_tasks:
        file: "{{ playbook_dir }}/apps/postgres/restore/main.yml"
      when: restore_app == 'postgres'
      tags: [postgres]

    - name: Restore Baikal
      ansible.builtin.include_tasks:
        file: "{{ playbook_dir }}/apps/baikal/restore/main.yml"
      when: restore_app == 'baikal'
      tags: [baikal]
