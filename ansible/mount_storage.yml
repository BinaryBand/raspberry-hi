---
# Optional: -e "mount_point=/mnt/storage fstype=ext4"

- name: Mount external storage
  hosts: devices
  become: true

  vars:
    mount_point: "/mnt/{{ label | default('storage') }}"
    fstype: auto

  pre_tasks:
    - name: Pick device to mount
      pick_device:
        host: "{{ ansible_host }}"
        user: "{{ ansible_user }}"
        key: "{{ ansible_ssh_private_key_file | default(omit) }}"
        port: "{{ ansible_port | default(22) }}"
      delegate_to: localhost
      become: false
      register: _picked
      when: device is not defined

    - name: Set device and label from selection
      ansible.builtin.set_fact:
        device: "{{ _picked.device }}"
        label: "{{ _picked.label }}"
      when: device is not defined

  tasks:
    - name: Ensure mount point directory exists
      ansible.builtin.file:
        path: "{{ mount_point }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Mount device and persist in fstab
      ansible.posix.mount:
        path: "{{ mount_point }}"
        src: "{{ device }}"
        fstype: "{{ fstype }}"
        opts: defaults,nofail
        state: mounted
