---
- name: Purge application from device
  hosts: devices
  gather_facts: true

  pre_tasks:
    - name: Verify become password is configured for this host
      ansible.builtin.assert:
        that: (become_passwords | default({})).get(inventory_hostname, '') | length > 0
        fail_msg: >-
          become password not set for '{{ inventory_hostname }}'.
          Run 'make bootstrap' to add it.
      tags: [always]

    - name: Require cleanup_app variable
      ansible.builtin.assert:
        that: cleanup_app is defined and cleanup_app | length > 0
        fail_msg: >-
          cleanup_app is not set.
          Pass it with: make cleanup APP=minio  (or postgres, baikal)
      tags: [always]

    - name: Validate cleanup_app is supported
      ansible.builtin.assert:
        that:
          - cleanup_app in ['minio', 'postgres', 'baikal']
        fail_msg: >-
          cleanup_app '{{ cleanup_app }}' is not supported.
          Supported cleanup apps: minio, postgres, baikal.
      tags: [always]

    - name: Confirm destructive operation
      ansible.builtin.pause:
        prompt: >-
          WARNING: This will PERMANENTLY DELETE all data for '{{ cleanup_app }}'
          on '{{ inventory_hostname }}'. Type 'yes' to continue
      register: _cleanup_confirm
      when: not (cleanup_skip_confirm | default(false) | bool)
      tags: [always]

    - name: Abort if not confirmed
      ansible.builtin.fail:
        msg: "Cleanup aborted."
      when:
        - not (cleanup_skip_confirm | default(false) | bool)
        - _cleanup_confirm.user_input | default('') != 'yes'
      tags: [always]

    # Set non-host-specific defaults that are not in host_vars/group_vars.
    # Cannot use include_vars here: it has higher precedence than host_vars and
    # would override required path vars (postgres_data_path, baikal_config_path,
    # etc.) with null, causing the file-removal tasks to silently do nothing.
    - name: Set service name defaults
      ansible.builtin.set_fact:
        minio_service_name: "{{ minio_service_name | default('minio') }}"
        postgres_service_name: "{{ postgres_service_name | default('postgres') }}"
        baikal_service_name: "{{ baikal_service_name | default('baikal') }}"
        baikal_db_name: "{{ baikal_db_name | default('baikal') }}"
      tags: [always]

  tasks:
    - name: Purge MinIO
      ansible.builtin.include_tasks:
        file: "{{ playbook_dir }}/apps/minio/tasks/cleanup.yml"
      when: cleanup_app == 'minio'
      tags: [minio]

    - name: Purge Baikal
      ansible.builtin.include_tasks:
        file: "{{ playbook_dir }}/apps/baikal/tasks/cleanup.yml"
      when: cleanup_app == 'baikal'
      tags: [baikal]

    - name: Purge PostgreSQL
      ansible.builtin.include_tasks:
        file: "{{ playbook_dir }}/apps/postgres/tasks/cleanup.yml"
      when: cleanup_app == 'postgres'
      tags: [postgres]
