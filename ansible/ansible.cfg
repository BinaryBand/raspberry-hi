[defaults]
inventory           = ./inventory/hosts.yml
# private_key_file  = ~/.ssh/id_ed25519
# Python interpreter is pinned per-host via ansible_python_interpreter in host_vars/.
roles_path          = ./roles:./apps
# Commands that need vault decryption must pass --vault-password-file explicitly.
# Run `make add-hostkey` once to add the Pi to known_hosts before provisioning.

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
pipelining = True
