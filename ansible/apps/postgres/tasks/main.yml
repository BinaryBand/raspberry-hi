---
- name: Assert postgres_data_path is set
  ansible.builtin.assert:
    that: postgres_data_path is not none
    fail_msg: >-
      postgres_data_path is not set for '{{ inventory_hostname }}'.
      Add it to ansible/inventory/host_vars/{{ inventory_hostname }}.yml:
        postgres_data_path: /srv/postgres/data

- name: Ensure PostgreSQL data directory exists
  ansible.builtin.file:
    path: "{{ postgres_data_path }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0750"
  become: true

- name: Check PostgreSQL data directory owner in podman user namespace
  ansible.builtin.command:
    argv:
      - podman
      - unshare
      - stat
      - -c
      - "%u"
      - "{{ postgres_data_path }}"
  become: true
  become_user: "{{ ansible_user }}"
  register: _postgres_data_uid
  changed_when: false

- name: Fix PostgreSQL data directory ownership for rootless podman
  ansible.builtin.command:
    argv:
      - podman
      - unshare
      - chown
      - -R
      - "{{ postgres_runtime_uid }}:{{ postgres_runtime_gid }}"
      - "{{ postgres_data_path }}"
  become: true
  become_user: "{{ ansible_user }}"
  when: _postgres_data_uid.stdout | trim != (postgres_runtime_uid | string)
  changed_when: true
  notify: restart postgres

- name: Ensure PostgreSQL config directory exists
  ansible.builtin.file:
    path: "{{ app_user_home }}/.config/postgres"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0700"
  become: true

- name: Check whether pg_hba.conf exists
  ansible.builtin.stat:
    path: "{{ postgres_data_path }}/pg_hba.conf"
  become: true
  register: _postgres_hba

- name: Allow password auth from the host's own addresses
  ansible.builtin.lineinfile:
    path: "{{ postgres_data_path }}/pg_hba.conf"
    regexp: '^host\s+all\s+all\s+samehost\s+'
    line: 'host    all             all             samehost                scram-sha-256'
    insertafter: EOF
  become: true
  when: _postgres_hba.stat.exists
  notify: restart postgres

- name: Allow password auth from rootless Podman host access network
  ansible.builtin.lineinfile:
    path: "{{ postgres_data_path }}/pg_hba.conf"
    regexp: '^host\s+all\s+all\s+169\.254\.0\.0/16\s+'
    line: 'host    all             all             169.254.0.0/16         scram-sha-256'
    insertafter: EOF
  become: true
  when: _postgres_hba.stat.exists
  notify: restart postgres

- name: Write PostgreSQL environment file
  ansible.builtin.template:
    src: postgres.env.j2
    dest: "{{ app_user_home }}/.config/postgres/postgres.env"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
  become: true
  notify: restart postgres
  no_log: true

- name: Ensure Podman quadlet directory exists
  ansible.builtin.file:
    path: "{{ app_user_home }}/.config/containers/systemd"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  become: true

- name: Install PostgreSQL Podman quadlet
  ansible.builtin.template:
    src: postgres.container.j2
    dest: "{{ app_user_home }}/.config/containers/systemd/postgres.container"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
  become: true
  notify: restart postgres

- name: Register PostgreSQL with service_adapter
  ansible.builtin.import_role:
    name: service_adapter
  vars:
    svc_name: "{{ postgres_service_name }}"
    svc_user: "{{ ansible_user }}"
    svc_run_script: "{{ app_user_home }}/bin/run-postgres.sh"
