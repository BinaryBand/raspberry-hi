---
- name: Set PostgreSQL dump path
  ansible.builtin.set_fact:
    _pg_dump_path: "{{ app_user_home }}/restic-postgres-dump.sql"

- name: Wait for PostgreSQL before backup
  ansible.builtin.include_tasks: "{{ playbook_dir }}/apps/postgres/tasks/wait_ready.yml"

- name: Dump baikal database from PostgreSQL container
  ansible.builtin.shell:
    cmd: >-
      podman exec --user {{ postgres_runtime_uid }} {{ postgres_service_name }}
      pg_dump -U {{ postgres_user }} {{ postgres_database }} > {{ _pg_dump_path }}
  become: true
  become_user: "{{ ansible_user }}"
  changed_when: false

- name: Check PostgreSQL backup paths on host
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ _pg_dump_path }}"
  register: _postgres_backup_paths
  become: true
  become_user: "{{ ansible_user }}"

- name: Fail if PostgreSQL backup paths are missing
  ansible.builtin.fail:
    msg: >-
      PostgreSQL backup path does not exist: {{ item.item }}.
      PostgreSQL dump creation failed before snapshotting.
  when: not item.stat.exists
  loop: "{{ _postgres_backup_paths.results }}"

- name: Snapshot PostgreSQL dump to restic
  ansible.builtin.include_role:
    name: restic
    tasks_from: backup
  vars:
    restic_snapshot_paths:
      - "{{ _pg_dump_path }}"
    restic_snapshot_tag: postgres

- name: Remove PostgreSQL dump file
  ansible.builtin.file:
    path: "{{ _pg_dump_path }}"
    state: absent
  become: true
  become_user: "{{ ansible_user }}"
