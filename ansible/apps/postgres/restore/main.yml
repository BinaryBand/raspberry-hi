---
- name: Get service user UID
  ansible.builtin.command: id -u
  become: true
  become_user: "{{ ansible_user }}"
  register: _svc_uid
  changed_when: false

- name: Set PostgreSQL dump restore path
  ansible.builtin.set_fact:
    _pg_dump_path: "{{ app_user_home }}/restic-postgres-dump.sql"

- name: Stop PostgreSQL service
  ansible.builtin.systemd:
    name: "{{ postgres_service_name }}"
    scope: user
    state: stopped
  become: true
  become_user: "{{ ansible_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ _svc_uid.stdout | trim }}"
  when: ansible_facts['service_mgr'] == 'systemd'

- name: Restore PostgreSQL dump from restic
  ansible.builtin.include_role:
    name: restic
    tasks_from: restore
  vars:
    restic_snapshot_tag: postgres
    restic_restore_target: /

- name: Clear PostgreSQL data directory for fresh cluster init
  ansible.builtin.file:
    path: "{{ postgres_data_path }}"
    state: absent
  become: true

- name: Recreate PostgreSQL data directory
  ansible.builtin.file:
    path: "{{ postgres_data_path }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0750"
  become: true

- name: Fix PostgreSQL data directory ownership for rootless podman
  ansible.builtin.command:
    argv:
      - podman
      - unshare
      - chown
      - -R
      - "{{ postgres_runtime_uid }}:{{ postgres_runtime_gid }}"
      - "{{ postgres_data_path }}"
  become: true
  become_user: "{{ ansible_user }}"
  changed_when: true

- name: Start PostgreSQL service (fresh cluster init from empty data dir)
  ansible.builtin.systemd:
    name: "{{ postgres_service_name }}"
    scope: user
    state: started
  become: true
  become_user: "{{ ansible_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ _svc_uid.stdout | trim }}"
  when: ansible_facts['service_mgr'] == 'systemd'

- name: Wait for PostgreSQL to accept connections
  ansible.builtin.command:
    argv:
      - podman
      - exec
      - "{{ postgres_service_name }}"
      - pg_isready
      - -U
      - postgres
  become: true
  become_user: "{{ ansible_user }}"
  register: _pg_ready
  retries: 30
  delay: 5
  until: _pg_ready.rc == 0
  changed_when: false

- name: Load PostgreSQL database dump
  ansible.builtin.shell:
    cmd: "podman exec --user postgres -i {{ postgres_service_name }} psql -U postgres {{ postgres_database }} < {{ _pg_dump_path }}"
  become: true
  become_user: "{{ ansible_user }}"
  changed_when: true

- name: Remove PostgreSQL dump file
  ansible.builtin.file:
    path: "{{ _pg_dump_path }}"
    state: absent
  become: true
  become_user: "{{ ansible_user }}"
