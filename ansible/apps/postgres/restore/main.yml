---
- name: Set PostgreSQL dump restore path
  ansible.builtin.set_fact:
    _pg_dump_path: "{{ app_user_home }}/restic-postgres-dump.sql"

- name: Stop PostgreSQL service
  ansible.builtin.include_role:
    name: service_adapter
    tasks_from: stop
  vars:
    svc_name: "{{ postgres_service_name }}"
    svc_user: "{{ ansible_user }}"
  when: not ansible_check_mode

- name: Restore PostgreSQL dump from restic
  ansible.builtin.include_role:
    name: restic
    tasks_from: restore
  vars:
    restic_snapshot_tag: postgres
    restic_restore_target: /
  when: not ansible_check_mode

- name: Clear PostgreSQL data directory for fresh cluster init
  ansible.builtin.file:
    path: "{{ postgres_data_path }}"
    state: absent
  become: true
  when: not ansible_check_mode

- name: Recreate PostgreSQL data directory
  ansible.builtin.file:
    path: "{{ postgres_data_path }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0750"
  become: true
  when: not ansible_check_mode

- name: Fix PostgreSQL data directory ownership for rootless podman
  ansible.builtin.command:
    argv:
      - podman
      - unshare
      - chown
      - -R
      - "{{ postgres_runtime_uid }}:{{ postgres_runtime_gid }}"
      - "{{ postgres_data_path }}"
  become: true
  become_user: "{{ ansible_user }}"
  when: not ansible_check_mode
  changed_when: true

- name: Start PostgreSQL service (fresh cluster init from empty data dir)
  ansible.builtin.include_role:
    name: service_adapter
    tasks_from: start
  vars:
    svc_name: "{{ postgres_service_name }}"
    svc_user: "{{ ansible_user }}"
  when: not ansible_check_mode

- name: Wait for PostgreSQL before restore
  ansible.builtin.include_tasks: ../tasks/wait_ready.yml
  when: not ansible_check_mode

- name: Load PostgreSQL database dump
  ansible.builtin.shell:
    cmd: >-
      podman exec --user {{ postgres_runtime_uid }} -i {{ postgres_service_name }}
      psql -U {{ postgres_user }} {{ postgres_database }} < {{ _pg_dump_path }}
  become: true
  become_user: "{{ ansible_user }}"
  when: not ansible_check_mode
  changed_when: true

- name: Remove PostgreSQL dump file
  ansible.builtin.file:
    path: "{{ _pg_dump_path }}"
    state: absent
  become: true
  become_user: "{{ ansible_user }}"
  when: not ansible_check_mode
