---
- name: Assert restic_rclone_remote is set
  ansible.builtin.assert:
    that: restic_rclone_remote is not none
    fail_msg: >-
      restic_rclone_remote is not set for '{{ inventory_hostname }}'.
      Add it to ansible/inventory/host_vars/{{ inventory_hostname }}.yml:
        restic_rclone_remote: pcloud

- name: Assert restic_repo_path is set
  ansible.builtin.assert:
    that: restic_repo_path is not none
    fail_msg: >-
      restic_repo_path is not set for '{{ inventory_hostname }}'.
      Add it to ansible/inventory/host_vars/{{ inventory_hostname }}.yml:
        restic_repo_path: Backups/linux-hi

- name: Assert restic_password is set
  ansible.builtin.assert:
    that: restic_password is not none
    fail_msg: >-
      restic_password is not set.
      Run 'make restic' to configure it, then reprovision with 'make site'.

- name: Check rclone is configured
  ansible.builtin.stat:
    path: "{{ app_user_home }}/.config/rclone/rclone.conf"
  register: _rclone_conf
  become: true
  become_user: "{{ ansible_user }}"

- name: Fail if rclone config is missing
  ansible.builtin.assert:
    that: _rclone_conf.stat.exists
    fail_msg: >-
      rclone config not found at {{ app_user_home }}/.config/rclone/rclone.conf.
      Run 'make rclone' to capture your local config, then reprovision with 'make site'.

- name: Install restic
  ansible.builtin.package:
    name: restic
    state: present
  become: true
