---
- name: Check whether restic repository exists
  ansible.builtin.command:
    argv:
      - restic
      - cat
      - config
  environment:
    RESTIC_REPOSITORY: "{{ restic_repository }}"
    RESTIC_PASSWORD: "{{ restic_password }}"
  become: true
  become_user: "{{ ansible_user }}"
  register: _restic_check
  failed_when: false
  changed_when: false
  no_log: true

- name: Classify missing restic repository
  ansible.builtin.set_fact:
    _restic_repo_missing: >-
      {{
        _restic_check.rc != 0 and (
          'Is there a repository at the following location?' in (_restic_check.stderr | default(''))
          or 'unable to open config file' in (_restic_check.stderr | default(''))
        )
      }}

- name: Initialize restic repository when requested
  ansible.builtin.command:
    argv:
      - restic
      - init
  environment:
    RESTIC_REPOSITORY: "{{ restic_repository }}"
    RESTIC_PASSWORD: "{{ restic_password }}"
  become: true
  become_user: "{{ ansible_user }}"
  when:
    - _restic_repo_missing
    - restic_init_repository | default(false) | bool
  changed_when: true
  no_log: true

- name: Fail if restic repository is missing
  ansible.builtin.fail:
    msg: >-
      restic repository does not exist for {{ restic_repository }}.
      Run 'make restic' to initialize it, or rerun the current command after fixing access.
  when:
    - _restic_repo_missing
    - not (restic_init_repository | default(false) | bool)

- name: Fail if restic repository check failed unexpectedly
  ansible.builtin.fail:
    msg: >-
      restic repository check failed unexpectedly for {{ restic_repository }}:
      {{ _restic_check.stderr | default('') | trim }}
  when:
    - _restic_check.rc != 0
    - not _restic_repo_missing
