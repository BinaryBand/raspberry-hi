---
- name: Prepare restic client and credentials
  ansible.builtin.import_tasks: prepare.yml

- name: Ensure restic repository exists
  ansible.builtin.import_tasks: repository.yml
  vars:
    restic_init_repository: true

- name: Prune old restic snapshots
  ansible.builtin.command:
    argv:
      - restic
      - forget
      - --keep-daily
      - "{{ restic_keep_daily | string }}"
      - --keep-weekly
      - "{{ restic_keep_weekly | string }}"
      - --keep-monthly
      - "{{ restic_keep_monthly | string }}"
      - --prune
  environment:
    RESTIC_REPOSITORY: "{{ restic_repository }}"
    RESTIC_PASSWORD: "{{ restic_password }}"
  become: true
  become_user: "{{ ansible_user }}"
  when: not ansible_check_mode
  changed_when: true
  no_log: true
