---
restic_rclone_remote: ~  # required; rclone remote name (e.g. pcloud) — set in host_vars/<hostname>.yml
restic_repo_path: ~      # required; path within the remote (e.g. Backups/linux-hi) — set in host_vars/<hostname>.yml

restic_repository: "rclone:{{ restic_rclone_remote }}:{{ restic_repo_path }}"
restic_snapshot_host: "{{ inventory_hostname }}"

restic_keep_daily: 7
restic_keep_weekly: 4
restic_keep_monthly: 12
