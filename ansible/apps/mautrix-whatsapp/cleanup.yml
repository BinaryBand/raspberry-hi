---
# 1. Stop service and remove boot integration.
- name: Deregister mautrix-whatsapp service
  ansible.builtin.include_role:
    name: service_adapter
    tasks_from: teardown
  vars:
    service_adapter_name: "{{ mautrix_whatsapp_service_name }}"
    service_adapter_user: "{{ ansible_user }}"
    service_adapter_run_script: "{{ app_user_home }}/bin/run-mautrix-whatsapp.sh"

# 2. Remove the container if it is still running.
- name: Remove mautrix-whatsapp container
  ansible.builtin.command:
    argv: [podman, rm, --force, --ignore, "{{ mautrix_whatsapp_service_name }}"]
  become: true
  become_user: "{{ ansible_user }}"
  changed_when: false

# 3. Drop the database from the running postgres container.
#    Soft-fail: if postgres is already stopped the database goes with it.
- name: Drop mautrix-whatsapp PostgreSQL database
  ansible.builtin.command:
    argv:
      - podman
      - exec
      - "{{ postgres_service_name }}"
      - dropdb
      - --if-exists
      - -U
      - postgres
      - "{{ mautrix_whatsapp_db_name }}"
  become: true
  become_user: "{{ ansible_user }}"
  register: _mautrix_whatsapp_dropdb
  failed_when: false
  changed_when: _mautrix_whatsapp_dropdb.rc == 0

# 4. Remove data directory.
- name: Remove mautrix-whatsapp data directory
  ansible.builtin.file:
    path: "{{ mautrix_whatsapp_data_path }}"
    state: absent
  become: true
