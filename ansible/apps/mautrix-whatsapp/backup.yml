---
- name: Check mautrix-whatsapp backup path on host
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ mautrix_whatsapp_data_path }}"
  register: _mautrix_whatsapp_backup_paths
  become: true
  become_user: "{{ ansible_user }}"

- name: Fail if mautrix-whatsapp backup path is missing
  ansible.builtin.fail:
    msg: >-
      mautrix-whatsapp backup path does not exist: {{ item.item }}.
      Run 'make mautrix-whatsapp' to provision it first.
  when: not item.stat.exists
  loop: "{{ _mautrix_whatsapp_backup_paths.results }}"

- name: Snapshot mautrix-whatsapp data to restic
  ansible.builtin.include_role:
    name: restic
    tasks_from: backup
  vars:
    restic_snapshot_paths:
      - "{{ mautrix_whatsapp_data_path }}"
    restic_snapshot_tag: mautrix-whatsapp
    restic_use_unshare: true
