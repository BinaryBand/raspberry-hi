- name: Check Baikal backup paths on host
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ baikal_config_path }}"
    - "{{ baikal_data_path }}"
  register: _baikal_backup_paths
  become: true
  become_user: "{{ ansible_user }}"

- name: Fail if Baikal backup paths are missing
  ansible.builtin.fail:
    msg: >-
      Baikal backup path does not exist: {{ item.item }}.
      Run 'make baikal' to provision Baikal first.
  when: not item.stat.exists
  loop: "{{ _baikal_backup_paths.results }}"

- name: Snapshot Baikal config and data to restic
  ansible.builtin.include_role:
    name: restic
    tasks_from: backup
  vars:
    restic_snapshot_paths:
      - "{{ baikal_config_path }}"
      - "{{ baikal_data_path }}"
    restic_snapshot_tag: baikal
    restic_use_unshare: true
