---
- name: restart baikal (systemd)
  listen: restart baikal
  ansible.builtin.systemd:
    name: "{{ baikal_service_name }}"
    scope: user
    state: restarted
    daemon_reload: true
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ _svc_user_uid }}"
  become: true
  become_user: "{{ ansible_user }}"
  when: service_adapter_backend == 'systemd'

- name: restart baikal (script)
  listen: restart baikal
  ansible.builtin.command: "{{ app_user_home }}/bin/run-baikal.sh"
  become: true
  become_user: "{{ ansible_user }}"
  when: service_adapter_backend != 'systemd'
