---
# 0. Guard: fail fast if required variables are not explicitly configured.
- name: Assert caddy_data_path is set
  ansible.builtin.assert:
    that: caddy_data_path is not none
    fail_msg: >-
      caddy_data_path is not set for '{{ inventory_hostname }}'.
      Add it to ansible/inventory/host_vars/{{ inventory_hostname }}.yml:
        caddy_data_path: /home/linux-hi/caddy

- name: Assert caddy_acme_email is set
  ansible.builtin.assert:
    that: caddy_acme_email is not none
    fail_msg: >-
      caddy_acme_email is not set for '{{ inventory_hostname }}'.
      Add it to ansible/inventory/host_vars/{{ inventory_hostname }}.yml:
        caddy_acme_email: you@example.com

- name: Assert caddy_server_name is set
  ansible.builtin.assert:
    that: caddy_server_name is not none
    fail_msg: >-
      caddy_server_name is not set for '{{ inventory_hostname }}'.
      Add it to ansible/inventory/host_vars/{{ inventory_hostname }}.yml:
        caddy_server_name: chat.example.com

# 1. Directories: ACME data path and config directory.
- name: Ensure Caddy data directory exists
  ansible.builtin.file:
    path: "{{ caddy_data_path }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0750"
  become: true

- name: Ensure Caddy config directory exists
  ansible.builtin.file:
    path: "{{ app_user_home }}/.config/caddy"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0700"
  become: true

# 2. Config: install Caddyfile.
- name: Install Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "{{ app_user_home }}/.config/caddy/Caddyfile"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
  become: true
  notify: restart caddy

# 3. Pre-pull image to avoid systemd timeout on slow connections.
- name: Pull Caddy container image
  ansible.builtin.command:
    argv:
      - podman
      - pull
      - "{{ caddy_image }}"
  become: true
  become_user: "{{ ansible_user }}"
  register: _caddy_pull
  changed_when: "'Copying' in _caddy_pull.stdout"

# 4. System prerequisite: allow rootless containers to bind ports 80 and 443.
#    Without this, pasta (rootless network backend) refuses to bind port 80.
- name: Allow unprivileged port binding from port 80
  ansible.posix.sysctl:
    name: net.ipv4.ip_unprivileged_port_start
    value: "80"
    sysctl_file: /etc/sysctl.d/99-unprivileged-ports.conf
    reload: true
  become: true

# 5. Deploy container unit.
- name: Prepare service adapter paths for Caddy
  ansible.builtin.include_role:
    name: service_adapter
    tasks_from: prepare
  vars:
    service_adapter_name: "{{ caddy_service_name }}"
    service_adapter_user: "{{ ansible_user }}"
    service_adapter_run_script: "{{ app_user_home }}/bin/run-caddy.sh"

- name: Install Caddy Podman quadlet
  ansible.builtin.include_role:
    name: service_adapter
    tasks_from: write_container
  vars:
    service_adapter_description: "Caddy Reverse Proxy"
    service_adapter_image: "{{ caddy_image }}"
    service_adapter_name: "{{ caddy_service_name }}"
    service_adapter_ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    service_adapter_volumes:
      - "{{ caddy_data_path }}:/data"
      - "{{ app_user_home }}/.config/caddy:/etc/caddy"

# 5. Wire up service management — adapter handles init-system details.
- name: Register Caddy with service_adapter
  ansible.builtin.import_role:
    name: service_adapter
  vars:
    service_adapter_name: "{{ caddy_service_name }}"
    service_adapter_user: "{{ ansible_user }}"
    service_adapter_run_script: "{{ app_user_home }}/bin/run-caddy.sh"
