# 1. App-specific config: directories and credentials.
- name: Ensure MinIO config directory exists
  ansible.builtin.file:
    path: "{{ app_user_home }}/.config/minio"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0700"
  become: true

- name: Write MinIO environment file
  ansible.builtin.template:
    src: minio.env.j2
    dest: "{{ app_user_home }}/.config/minio/minio.env"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
  become: true
  notify: restart minio
  no_log: true

# 2. Deploy container unit (app owns the template; service_adapter owns the directory).
- name: Install MinIO Podman quadlet
  ansible.builtin.template:
    src: minio.container.j2
    dest: "{{ app_user_home }}/.config/containers/systemd/minio.container"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
  become: true
  notify: restart minio

# 3. Wire up service management — adapter handles init-system details.
- name: Register MinIO with service_adapter
  ansible.builtin.import_role:
    name: service_adapter
  vars:
    svc_name: "{{ minio_service_name }}"
    svc_user: "{{ ansible_user }}"
    svc_run_script: "{{ app_user_home }}/bin/run-minio.sh"
    svc_requires_mount: "{{ minio_data_path }}"

# 4. Post-deployment: ensure mc is present then configure bucket and policy.
- name: Setup MinIO buckets and public policy
  ansible.builtin.include_tasks: setup_mc_bucket.yml
  when: not (minio_skip_bucket_setup | default(false))
