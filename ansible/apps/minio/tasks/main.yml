# 0. Guard: fail fast if required variables are not explicitly configured.
- name: Assert minio_data_path is set
  ansible.builtin.assert:
    that: minio_data_path is not none
    fail_msg: >-
      minio_data_path is not set for '{{ inventory_hostname }}'.
      Add it to ansible/inventory/host_vars/{{ inventory_hostname }}.yml:
        minio_data_path: /srv/minio/data

# 1. Directories: data path + app config.
- name: Ensure MinIO data directory exists
  ansible.builtin.file:
    path: "{{ minio_data_path }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0750"
  become: true

- name: Ensure MinIO config directory exists
  ansible.builtin.file:
    path: "{{ app_user_home }}/.config/minio"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0700"
  become: true

- name: Write MinIO environment file
  ansible.builtin.template:
    src: minio.env.j2
    dest: "{{ app_user_home }}/.config/minio/minio.env"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
  become: true
  notify: restart minio
  no_log: true

# 2. Deploy container unit.
- name: Prepare service adapter paths for MinIO
  ansible.builtin.include_role:
    name: service_adapter
    tasks_from: prepare
  vars:
    service_adapter_name: "{{ minio_service_name }}"
    service_adapter_user: "{{ ansible_user }}"
    service_adapter_run_script: "{{ app_user_home }}/bin/run-minio.sh"

- name: Install MinIO Podman quadlet
  ansible.builtin.include_role:
    name: service_adapter
    tasks_from: write_container
  vars:
    service_adapter_description: "MinIO Object Storage"
    service_adapter_image: "{{ minio_image }}"
    service_adapter_name: "{{ minio_service_name }}"
    service_adapter_ports:
      - "{{ minio_port }}:9000"
      - "{{ minio_console_port }}:9001"
    service_adapter_volumes:
      - "{{ minio_data_path }}:/data"
    service_adapter_exec: "server /data --address :{{ minio_port }} --console-address :{{ minio_console_port }}"
    service_adapter_env_file: "{{ app_user_home }}/.config/minio/minio.env"

# 3. Wire up service management — adapter handles init-system details.
- name: Register MinIO with service_adapter
  ansible.builtin.import_role:
    name: service_adapter
  vars:
    service_adapter_name: "{{ minio_service_name }}"
    service_adapter_user: "{{ ansible_user }}"
    service_adapter_run_script: "{{ app_user_home }}/bin/run-minio.sh"

# 4. Post-deployment: ensure mc is present then configure bucket and policy.
- name: Setup MinIO buckets and public policy
  ansible.builtin.include_tasks: setup_mc_bucket.yml
  when: not minio_skip_bucket_setup
