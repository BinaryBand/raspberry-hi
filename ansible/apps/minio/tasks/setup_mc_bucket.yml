---
# Waits for MinIO to be healthy, then uses the official minio/mc container
# (via the already-installed Podman) to configure the alias, create the
# bucket, and set the access policy. No mc binary installation required.

- name: "Wait for MinIO TCP port to be available: {{ minio_port }}"
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ minio_port }}"
    state: started
    timeout: "{{ (mc_wait_retries | int) * (mc_wait_delay | int) }}"

- name: Wait until MinIO health endpoint responds HTTP 200
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ minio_port }}/minio/health/ready"
    method: GET
    status_code: 200
    validate_certs: false
  register: minio_health
  retries: "{{ mc_wait_retries }}"
  delay: "{{ mc_wait_delay }}"
  until: minio_health.status == 200
  failed_when: false

- name: "Check whether MinIO bucket exists: {{ mc_alias + '/' + mc_bucket }}"
  ansible.builtin.command:
    argv:
      - podman
      - run
      - --rm
      - --network=host
      - --env-file
      - "{{ app_user_home }}/.config/minio/minio.env"
      - "{{ mc_image }}"
      - ls
      - "{{ mc_alias }}/{{ mc_bucket }}"
  become: true
  become_user: "{{ ansible_user }}"
  register: mc_bucket_check
  failed_when: false
  changed_when: false
  no_log: true

- name: "Create bucket if missing: {{ mc_bucket }}"
  ansible.builtin.command:
    argv:
      - podman
      - run
      - --rm
      - --network=host
      - --env-file
      - "{{ app_user_home }}/.config/minio/minio.env"
      - "{{ mc_image }}"
      - mb
      - "{{ mc_alias }}/{{ mc_bucket }}"
  become: true
  become_user: "{{ ansible_user }}"
  register: mc_bucket_mb
  failed_when: mc_bucket_mb.rc != 0
  changed_when: mc_bucket_mb.rc == 0
  when: mc_bucket_check.rc != 0
  no_log: true

- name: "Set anonymous policy on MinIO bucket: {{ mc_alias + '/' + mc_bucket }}"
  ansible.builtin.command:
    argv:
      - podman
      - run
      - --rm
      - --network=host
      - --env-file
      - "{{ app_user_home }}/.config/minio/minio.env"
      - "{{ mc_image }}"
      - anonymous
      - set
      - "{{ mc_policy }}"
      - "{{ mc_alias }}/{{ mc_bucket }}"
  become: true
  become_user: "{{ ansible_user }}"
  register: mc_policy_set
  failed_when: mc_policy_set.rc != 0
  changed_when: mc_policy_set.rc == 0
  no_log: true
