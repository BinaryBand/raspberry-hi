---
# 1. Stop service and remove boot integration.
- name: Deregister MinIO service
  ansible.builtin.include_role:
    name: service_adapter
    tasks_from: teardown
  vars:
    service_adapter_name: "{{ minio_service_name }}"
    service_adapter_user: "{{ ansible_user }}"
    service_adapter_run_script: "{{ app_user_home }}/bin/run-minio.sh"

# 2. Remove the container if it is still running (quadlet stop may not have caught it).
- name: Remove MinIO container
  ansible.builtin.command:
    argv: [podman, rm, --force, --ignore, "{{ minio_service_name }}"]
  become: true
  become_user: "{{ ansible_user }}"
  changed_when: false

# 3. Remove config and data directories.
- name: Remove MinIO config directory
  ansible.builtin.file:
    path: "{{ app_user_home }}/.config/minio"
    state: absent
  become: true

- name: Remove MinIO data directory
  ansible.builtin.file:
    path: "{{ minio_data_path }}"
    state: absent
  become: true
