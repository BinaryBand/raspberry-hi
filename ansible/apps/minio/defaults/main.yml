---
# Pin to a specific release tag for reproducibility.
# Browse tags at: https://hub.docker.com/r/minio/minio/tags
minio_image: docker.io/minio/minio:RELEASE.2025-04-08T15-41-24Z
minio_data_path: /srv/minio/data
minio_port: 9000
minio_console_port: 9001
minio_service_name: minio

# MinIO client (mc) defaults for bucket setup and policy management.
# mc_install_method and mc_binary_path are set in roles/mc_adapter/defaults/main.yml.
# Override per-host in host_vars if needed.
mc_alias: myminio
mc_bucket: media
mc_url: "http://127.0.0.1:{{ minio_port }}"
mc_wait_retries: 30
mc_wait_delay: 5
mc_policy: download

# When true (default), provisioning fails if minio_data_path is not on an
# external mount — encouraging you to run 'make mount' first. Set to false
# in host_vars to store MinIO data on the root filesystem instead.
minio_require_external_mount: true
