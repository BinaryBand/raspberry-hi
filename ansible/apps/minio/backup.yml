- name: Check MinIO backup paths on host
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ minio_data_path }}"
  register: _minio_backup_paths
  become: true
  become_user: "{{ ansible_user }}"

- name: Fail if MinIO backup paths are missing
  ansible.builtin.fail:
    msg: >-
      MinIO backup path does not exist: {{ item.item }}.
      Run 'make minio' to provision MinIO first.
  when: not item.stat.exists
  loop: "{{ _minio_backup_paths.results }}"

- name: Snapshot MinIO data to restic
  ansible.builtin.include_role:
    name: restic
    tasks_from: backup
  vars:
    restic_snapshot_paths:
      - "{{ minio_data_path }}"
    restic_snapshot_tag: minio
