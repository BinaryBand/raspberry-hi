---
synapse_data_path: ~  # required; set in host_vars/<hostname>.yml

# Matrix server name — appears in all user and room IDs (@user:server_name).
# Must match the domain your Matrix clients connect to.
synapse_server_name: ~  # required; e.g. chat.doreeto.com

# Whether to report anonymous usage statistics to the Matrix.org team.
synapse_report_stats: "no"

# PostgreSQL database (uses the shared postgres instance and user).
synapse_db_name: synapse
synapse_db_host: localhost
synapse_db_user: "{{ postgres_user }}"
synapse_db_password: "{{ postgres_password }}"
