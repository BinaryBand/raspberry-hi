---
- name: Check Synapse backup path on host
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ synapse_data_path }}"
  register: _synapse_backup_paths
  become: true
  become_user: "{{ ansible_user }}"

- name: Fail if Synapse backup path is missing
  ansible.builtin.fail:
    msg: >-
      Synapse backup path does not exist: {{ item.item }}.
      Run 'make synapse' to provision it first.
  when: not item.stat.exists
  loop: "{{ _synapse_backup_paths.results }}"

- name: Snapshot Synapse data to restic
  ansible.builtin.include_role:
    name: restic
    tasks_from: backup
  vars:
    restic_snapshot_paths:
      - "{{ synapse_data_path }}"
    restic_snapshot_tag: synapse
    restic_use_unshare: true
