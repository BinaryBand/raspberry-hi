rules:
  - id: python-no-direct-subprocess-import
    message: Use scripts.utils.exec_utils.run_resolved instead of importing subprocess directly.
    severity: ERROR
    languages:
      - python
    paths:
      include:
        - /scripts/**/*.py
        - /tests/**/*.py
      exclude:
        - /scripts/utils/exec_utils.py
    patterns:
      - pattern-either:
          - pattern: import subprocess
          - pattern: from subprocess import $X

  - id: python-no-direct-subprocess-call
    message: Use scripts.utils.exec_utils.run_resolved instead of calling subprocess directly.
    severity: ERROR
    languages:
      - python
    paths:
      include:
        - /scripts/**/*.py
        - /tests/**/*.py
      exclude:
        - /scripts/utils/exec_utils.py
    patterns:
      - pattern-either:
          - pattern: subprocess.run(...)
          - pattern: subprocess.Popen(...)
          - pattern: subprocess.call(...)
          - pattern: subprocess.check_call(...)
          - pattern: subprocess.check_output(...)

  - id: python-must-not-run-ansible-playbook
    message: Python may assist with setup and validation, but playbook orchestration belongs to Makefile and Ansible entrypoints.
    severity: ERROR
    languages:
      - python
    paths:
      include:
        - /scripts/**/*.py
        - /tests/**/*.py
    patterns:
      - pattern-either:
          - pattern: $F(["ansible-playbook", ...], ...)
          - pattern: $F(("ansible-playbook", ...), ...)